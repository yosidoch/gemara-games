<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Race — Gemara BM Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;900&family=Frank+Ruhl+Libre:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #16a34a;
    --green-light: #22c55e;
    --green-pale: #dcfce7;
    --amber: #f59e0b;
    --amber-light: #fbbf24;
    --amber-pale: #fffbeb;
    --red: #ef4444;
    --gray: #6b7280;
    --gray-light: #f3f4f6;
  }

  body {
    font-family: 'Rubik', sans-serif;
    background: linear-gradient(135deg, #f0fdf4 0%, #fffbeb 100%);
    min-height: 100vh;
    color: #1f2937;
  }

  a { text-decoration: none; }

  /* ===================== HEADER ===================== */
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #e5e7eb;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #back-btn {
    font-family: 'Rubik', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--green);
    cursor: pointer;
    background: none;
    border: 2px solid var(--green);
    border-radius: 8px;
    padding: 6px 14px;
    transition: all 0.2s;
  }
  #back-btn:hover { background: var(--green); color: #fff; }
  #game-title-bar { font-size: 18px; font-weight: 700; color: var(--green); }
  #level-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    color: #fff;
    display: none;
  }

  /* ===================== SCREENS ===================== */
  .screen { display: none; padding: 20px; max-width: 860px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ===================== LEVEL SELECT ===================== */
  #screen-levels h1 {
    font-size: 32px;
    font-weight: 900;
    color: var(--green);
    text-align: center;
    margin: 30px 0 8px;
  }
  #screen-levels p.sub {
    text-align: center;
    color: var(--gray);
    margin-bottom: 32px;
    font-size: 15px;
  }
  #levels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    max-width: 760px;
    margin: 0 auto;
  }
  .level-tile {
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    position: relative;
    border: 3px solid transparent;
    transition: all 0.25s;
    color: #fff;
    user-select: none;
  }
  .level-tile:hover:not(.locked) { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.18); }
  .level-tile.locked { filter: grayscale(0.6); opacity: 0.65; cursor: not-allowed; }
  .level-tile .lnum { font-size: 13px; font-weight: 600; opacity: 0.85; margin-bottom: 4px; }
  .level-tile .ltitle { font-size: 17px; font-weight: 800; margin-bottom: 2px; }
  .level-tile .lsub { font-size: 12px; opacity: 0.8; margin-bottom: 10px; }
  .level-tile .stars { font-size: 22px; letter-spacing: 3px; }
  .level-tile .lock-icon { font-size: 30px; margin-bottom: 6px; }
  .level-tile[data-level="1"] { background: #16a34a; }
  .level-tile[data-level="2"] { background: #3b82f6; }
  .level-tile[data-level="3"] { background: #f59e0b; }
  .level-tile[data-level="4"] { background: #ef4444; }

  /* ===================== RACE GAME SCREEN ===================== */
  #screen-game { padding: 12px 16px; }

  /* Progress */
  #progress-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  #progress-text { font-size: 14px; font-weight: 600; color: var(--gray); white-space: nowrap; }
  #progress-track {
    flex: 1;
    height: 8px;
    background: #e5e7eb;
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    transition: width 0.4s ease;
    width: 0%;
  }

  /* Race Track */
  #race-track {
    background: #fff;
    border-radius: 16px;
    padding: 14px 18px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 1px solid #e5e7eb;
  }
  #score-display {
    display: flex;
    justify-content: center;
    gap: 28px;
    margin-bottom: 12px;
    font-size: 15px;
    font-weight: 700;
  }
  .score-you { color: var(--green); }
  .score-ai { color: var(--amber); }
  .lane {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .lane:last-of-type { margin-bottom: 0; }
  .lane-label {
    font-size: 13px;
    font-weight: 700;
    width: 56px;
    flex-shrink: 0;
  }
  .lane-label.you { color: var(--green); }
  .lane-label.ai { color: var(--amber); }
  .lane-track {
    flex: 1;
    height: 32px;
    background: #f3f4f6;
    border-radius: 99px;
    position: relative;
    overflow: visible;
    border: 1px solid #e5e7eb;
  }
  .car {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 0%;
    font-size: 22px;
    transition: left 0.5s ease;
    filter: drop-shadow(0 2px 3px rgba(0,0,0,0.2));
    line-height: 1;
  }
  .finish-flag {
    position: absolute;
    right: -2px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 22px;
  }
  #ai-message {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--amber);
    height: 20px;
    transition: opacity 0.3s;
  }

  /* Question area */
  #question-area {
    background: #fff;
    border-radius: 16px;
    padding: 22px 20px 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.07);
    border: 1px solid #e5e7eb;
    text-align: center;
  }
  #question-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--gray);
    margin-bottom: 8px;
  }
  #english-prompt {
    font-size: 26px;
    font-weight: 800;
    color: #111827;
    margin-bottom: 0;
    line-height: 1.2;
  }

  /* Answers */
  #answers-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 14px;
  }
  .answer-btn {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 19px;
    font-weight: 700;
    direction: rtl;
    text-align: center;
    padding: 18px 12px;
    background: #fff;
    border: 2.5px solid #d1d5db;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.18s;
    color: #111827;
    line-height: 1.3;
    box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    min-height: 64px;
  }
  .answer-btn:hover:not(:disabled) {
    border-color: var(--green);
    background: var(--green-pale);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(22,163,74,0.15);
  }
  .answer-btn.correct {
    background: #dcfce7;
    border-color: var(--green-light);
    color: #166534;
  }
  .answer-btn.wrong {
    background: #fee2e2;
    border-color: var(--red);
    color: #991b1b;
  }
  .answer-btn.ai-picked {
    animation: ai-flash 0.5s ease;
  }
  @keyframes ai-flash {
    0% { background: #fff; }
    30% { background: #fef3c7; border-color: var(--amber); }
    100% { background: #fff; }
  }
  .answer-btn:disabled { cursor: default; }

  /* Timer */
  #timer-wrap {
    background: #fff;
    border-radius: 12px;
    padding: 10px 14px;
    border: 1px solid #e5e7eb;
    box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }
  #timer-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: 600;
    color: var(--gray);
    margin-bottom: 6px;
  }
  #timer-track {
    height: 12px;
    background: #e5e7eb;
    border-radius: 99px;
    overflow: hidden;
  }
  #timer-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.1s linear, background-color 0.5s;
    width: 100%;
    background: var(--green);
  }

  /* ===================== RESULTS SCREEN ===================== */
  #screen-results { text-align: center; }
  #results-header { margin: 24px 0 18px; }
  #results-emoji { font-size: 52px; margin-bottom: 10px; }
  #results-title { font-size: 28px; font-weight: 900; color: var(--green); margin-bottom: 4px; }
  #results-subtitle { font-size: 16px; color: var(--gray); }
  #results-race-summary {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin: 16px 0;
    font-size: 20px;
    font-weight: 800;
  }
  .rs-you { color: var(--green); }
  .rs-ai { color: var(--amber); }
  #stars-display {
    font-size: 42px;
    letter-spacing: 8px;
    margin: 10px 0 20px;
  }
  #results-table-wrap {
    overflow-x: auto;
    margin: 0 auto 24px;
    max-width: 820px;
  }
  #results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    text-align: left;
  }
  #results-table th {
    background: var(--green);
    color: #fff;
    padding: 10px 12px;
    font-weight: 700;
    font-size: 13px;
  }
  #results-table td {
    padding: 9px 12px;
    border-bottom: 1px solid #e5e7eb;
    vertical-align: middle;
  }
  #results-table tr:nth-child(even) td { background: #f9fafb; }
  #results-table .aramaic-cell {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 16px;
    direction: rtl;
    text-align: right;
  }
  #results-table .ok { color: var(--green); font-weight: 700; font-size: 16px; }
  #results-table .fail { color: var(--red); font-weight: 700; font-size: 16px; }
  #results-btns {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .results-btn {
    font-family: 'Rubik', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .results-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
  .btn-green { background: var(--green); color: #fff; }
  .btn-amber { background: var(--amber); color: #fff; }
  .btn-gray { background: #e5e7eb; color: #374151; }

  @media (max-width: 480px) {
    #english-prompt { font-size: 20px; }
    .answer-btn { font-size: 16px; padding: 14px 8px; }
    #answers-grid { gap: 8px; }
    #race-track { padding: 10px 12px; }
    #screen-levels h1 { font-size: 24px; }
  }
</style>
</head>
<body>

<div id="top-bar">
  <button id="back-btn" onclick="handleBack()">← Back to Games</button>
  <div id="game-title-bar">🏎️ Word Race</div>
  <div id="level-badge"></div>
</div>

<!-- LEVEL SELECT -->
<div id="screen-levels" class="screen active">
  <h1>🏎️ Word Race</h1>
  <p class="sub">Race against the AI — pick the correct Aramaic word before time runs out!</p>
  <div id="levels-grid"></div>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div id="progress-bar-wrap">
    <div id="progress-text">Round 1 / 10</div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>

  <div id="race-track">
    <div id="score-display">
      <span class="score-you">YOU: <span id="score-you-val">0</span></span>
      <span class="score-ai">AI: <span id="score-ai-val">0</span></span>
    </div>

      <div class="lane-label you">YOU 🎓</div>
      <div class="lane-track">

  <div id="question-area">

    <div id="english-prompt"></div>
  </div>

  <div id="answers-grid">

    <button class="answer-btn" id="btn-1" onclick="playerAnswer(1)"></button>
    <button class="answer-btn" id="btn-2" onclick="playerAnswer(2)"></button>
    <button class="answer-btn" id="btn-3" onclick="playerAnswer(3)"></button>
  </div>

  <div id="timer-wrap">
    <div id="timer-label">
      <span>⏱️ Time</span>
      <span id="timer-seconds"></span>
    </div>
    <div id="timer-track"><div id="timer-fill"></div></div>
  </div>
</div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <div id="results-header">
    <div id="results-emoji"></div>
    <div id="results-title"></div>
    <div id="results-subtitle"></div>
  </div>
  <div id="results-race-summary">
    <span class="rs-you">YOU: <span id="rs-you"></span></span>
    <span>vs</span>
    <span class="rs-ai">AI: <span id="rs-ai"></span></span>
  </div>
  <div id="stars-display"></div>
  <div id="results-table-wrap">
    <table id="results-table"></table>
  </div>
  <div id="results-btns">
    <button class="results-btn btn-gray" onclick="goLevels()">← Back to Levels</button>
    <button class="results-btn btn-green" onclick="playAgain()">▶ Play Again</button>
    <button class="results-btn btn-amber" id="next-level-btn" onclick="nextLevel()">Next Level →</button>
  </div>
</div>

const LEVEL_COLORS = { 1:'#16a34a', 2:'#3b82f6', 3:'#f59e0b', 4:'#ef4444' };

// ===================== PROGRESS =====================
const STORAGE_KEY = 'gemara_bm_progress';
function getProgress() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
function saveProgress(gameId, level, stars) {
  const p = getProgress();
  if (!p[gameId]) p[gameId] = {};
  if (!p[gameId][level] || stars > p[gameId][level]) p[gameId][level] = stars;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}
function isUnlocked(gameId, level) {
  if (level === 1) return true;
  const p = getProgress();
  return !!(p[gameId] && p[gameId][level-1] > 0);
}
function calcStars(correct, total) {
  const pct = correct / total;
  if (pct >= 0.9) return 3; if (pct >= 0.6) return 2; return 1;
}
function getStars(gameId, level) {
  const p = getProgress();
  return (p[gameId] && p[gameId][level]) || 0;
}

// ===================== SOUND =====================
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.type='sine';
      osc.frequency.setValueAtTime(523,ctx.currentTime);
      osc.frequency.setValueAtTime(659,ctx.currentTime+0.12);
      osc.frequency.setValueAtTime(784,ctx.currentTime+0.25);
      gain.gain.setValueAtTime(0.3,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
      osc.start();osc.stop(ctx.currentTime+0.5);
    } else if (type === 'wrong') {
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(250,ctx.currentTime);
      osc.frequency.setValueAtTime(180,ctx.currentTime+0.15);
      gain.gain.setValueAtTime(0.2,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      osc.start();osc.stop(ctx.currentTime+0.3);
    } else if (type === 'levelComplete') {
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0.25,ctx.currentTime+i*0.15);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.35);
        o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.4);
      });
    } else if (type === 'tick') {
      osc.type='sine';osc.frequency.value=880;
      gain.gain.setValueAtTime(0.08,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.05);
      osc.start();osc.stop(ctx.currentTime+0.05);
    } else if (type === 'step') {
      osc.type='sine';osc.frequency.value=440;
      gain.gain.setValueAtTime(0.05,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.04);
      osc.start();osc.stop(ctx.currentTime+0.04);
    }
  } catch(e) {}
}

// ===================== UTILS =====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ===================== LEVEL SELECT =====================
function renderLevelSelect() {
  const grid = document.getElementById('levels-grid');
  grid.innerHTML = '';
  for (let lvl = 1; lvl <= 4; lvl++) {
    const ld = LEVELS_DATA[lvl];
    const unlocked = isUnlocked(GAME_ID, lvl);
    const stars = getStars(GAME_ID, lvl);
    const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);

    const tile = document.createElement('div');
    tile.className = 'level-tile' + (unlocked ? '' : ' locked');
    tile.dataset.level = lvl;

    if (!unlocked) {
      tile.innerHTML = `
        <div class="lock-icon">🔒</div>
        <div class="ltitle">Level ${lvl}</div>
        <div class="lsub">${ld.subtitle}</div>
        <div class="stars">☆☆☆</div>`;
    } else {
      tile.innerHTML = `
        <div class="lnum">Level ${lvl}</div>
        <div class="ltitle">${ld.title}</div>
        <div class="lsub">${ld.subtitle}</div>
        <div class="stars">${starStr}</div>`;
      tile.onclick = () => startLevel(lvl);
    }
    grid.appendChild(tile);
  }
}

function goLevels() {
  clearGameTimers();
  const badge = document.getElementById('level-badge');
  badge.style.display = 'none';
  renderLevelSelect();
  showScreen('screen-levels');
  // Update URL
  const url = new URL(window.location.href);
  url.searchParams.delete('level');
  window.history.replaceState({}, '', url);
}

function handleBack() {
  const url = new URL(window.location.href);
  const onLevelScreen = document.getElementById('screen-levels').classList.contains('active');
  if (onLevelScreen) {
    window.location.href = 'index.html';
  } else {
    goLevels();
  }
}

// ===================== GAME STATE =====================
let currentLevel = 1;
let levelData = null;
let roundedWords = [];
let currentRound = 0;
let currentChoices = [];
let correctIndex = 0;

let playerScore = 0;
let aiScore = 0;
let roundResults = [];

let timerInterval = null;
let timerStart = 0;
let timePerQ = 12;
let roundAnswered = false;

let aiTimer = null;
let aiAnsweredThisRound = false;

let ticksPlayed = 0;

function clearGameTimers() {
  if (timerInterval) clearInterval(timerInterval);
  if (aiTimer) clearTimeout(aiTimer);
  timerInterval = null;
  aiTimer = null;
}

// ===================== START LEVEL =====================
function startLevel(lvl) {
  currentLevel = lvl;
  levelData = LEVELS_DATA[lvl];
  timePerQ = levelData.timePerQ;

  // Update URL
  const url = new URL(window.location.href);
  url.searchParams.set('level', lvl);
  window.history.replaceState({}, '', url);

  // Update badge
  const badge = document.getElementById('level-badge');
  badge.textContent = `Level ${lvl} — ${levelData.title}`;
  badge.style.background = LEVEL_COLORS[lvl];
  badge.style.display = 'block';

  // Reset state
  roundedWords = shuffle([...levelData.words]);
  currentRound = 0;
  playerScore = 0;
  aiScore = 0;
  roundResults = [];

  document.getElementById('score-you-val').textContent = '0';
  document.getElementById('score-ai-val').textContent = '0';
  updateCarPositions();

  showScreen('screen-game');
  loadRound();
}

// ===================== ROUND LOGIC =====================
function loadRound() {
  clearGameTimers();
  roundAnswered = false;
  aiAnsweredThisRound = false;
  document.getElementById('ai-message').textContent = '';

  const total = roundedWords.length;
  if (currentRound >= total) {
    showResults();
    return;
  }

  // Progress
  document.getElementById('progress-text').textContent = `Round ${currentRound + 1} / ${total}`;
  document.getElementById('progress-fill').style.width = `${(currentRound / total) * 100}%`;

  // Current word
  const word = roundedWords[currentRound];
  document.getElementById('english-prompt').textContent = word.en;

  // Build choices: 1 correct + 3 random wrong
  const pool = levelData.words.filter(w => w.ar !== word.ar);
  const wrong = shuffle(pool).slice(0, 3);
  const allChoices = shuffle([word, ...wrong]);
  currentChoices = allChoices;
  correctIndex = allChoices.findIndex(c => c.ar === word.ar);

  // Render buttons
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`btn-${i}`);
    btn.textContent = allChoices[i].ar;
    btn.className = 'answer-btn';
    btn.disabled = false;
  }

  // Timer
  startTimer();

  // AI opponent
  scheduleAI();
}

function startTimer() {
  const totalMs = timePerQ * 1000;
  timerStart = Date.now();
  ticksPlayed = 0;

  document.getElementById('timer-seconds').textContent = timePerQ + 's';
  document.getElementById('timer-fill').style.width = '100%';
  document.getElementById('timer-fill').style.backgroundColor = '#16a34a';

  timerInterval = setInterval(() => {
    const elapsed = Date.now() - timerStart;
    const remaining = Math.max(0, totalMs - elapsed);
    const fraction = remaining / totalMs;
    const secs = Math.ceil(remaining / 1000);

    document.getElementById('timer-fill').style.width = (fraction * 100) + '%';
    document.getElementById('timer-seconds').textContent = secs + 's';

    // Color shift
    if (fraction > 0.5) {
      document.getElementById('timer-fill').style.backgroundColor = '#16a34a';
    } else if (fraction > 0.25) {
      document.getElementById('timer-fill').style.backgroundColor = '#f59e0b';
    } else {
      document.getElementById('timer-fill').style.backgroundColor = '#ef4444';
    }

    // Tick sound last 3 secs
    if (secs <= 3 && secs !== ticksPlayed) {
      ticksPlayed = secs;
      playSound('tick');
    }

    if (remaining <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      if (!roundAnswered) {
        timeExpired();
      }
    }
  }, 80);
}

function timeExpired() {
  roundAnswered = true;
  if (aiTimer) { clearTimeout(aiTimer); aiTimer = null; }

  // Reveal correct answer
  revealAnswers(-1);

  playSound('wrong');

  const word = roundedWords[currentRound];
  roundResults.push({
    round: currentRound + 1,
    en: word.en,
    playerAr: null,
    aiAr: null,
    correctAr: word.ar,
    playerOk: false,
    aiOk: null
  });

  setTimeout(() => {
    currentRound++;
    loadRound();
  }, 1400);
}

function playerAnswer(idx) {
  if (roundAnswered) return;
  roundAnswered = true;

  clearInterval(timerInterval);
  timerInterval = null;

  const word = roundedWords[currentRound];
  const chosen = currentChoices[idx];
  const ok = chosen.ar === word.ar;

  if (ok) { playerScore++; playSound('correct'); }
  else { playSound('wrong'); }

  document.getElementById('score-you-val').textContent = playerScore;
  updateCarPositions();

  revealAnswers(idx);

  // Store partial result (AI answer may come after)
  roundResults.push({
    round: currentRound + 1,
    en: word.en,
    playerAr: chosen.ar,
    aiAr: null,
    correctAr: word.ar,
    playerOk: ok,
    aiOk: null
  });

  // AI still answers for visual (within 0.8s from now if hasn't yet)
  if (!aiAnsweredThisRound && aiTimer) {
    clearTimeout(aiTimer);
    aiTimer = setTimeout(() => {
      if (aiAnsweredThisRound) return;
      doAIAnswer(true); // late visual
    }, 500);
  }

  setTimeout(() => {
    currentRound++;
    loadRound();
  }, 1400);
}

function revealAnswers(playerIdx) {
  for (let i = 0; i < 4; i++) {
    const btn = document.getElementById(`btn-${i}`);
    btn.disabled = true;
    if (i === correctIndex) {
      btn.classList.add('correct');
    } else if (i === playerIdx) {
      btn.classList.add('wrong');
    }
  }
}

// ===================== AI LOGIC =====================
function scheduleAI() {
  const delay = Math.random() * 5000 + 4000; // 4-9 seconds
  aiTimer = setTimeout(() => {
    if (!roundAnswered) {
      doAIAnswer(false);
    } else {
      doAIAnswer(true); // late but show visual
    }
  }, delay);
}

function doAIAnswer(late) {
  if (aiAnsweredThisRound) return;
  aiAnsweredThisRound = true;

  const word = roundedWords[currentRound] || roundedWords[roundedWords.length - 1];
  const aiCorrect = Math.random() < 0.70;

  let aiChosenAr;
  if (aiCorrect) {
    aiChosenAr = word.ar;
    if (!late) {
      aiScore++;
      document.getElementById('score-ai-val').textContent = aiScore;
      updateCarPositions();
    }
  } else {
    const wrongs = currentChoices.filter(c => c.ar !== word.ar);
    aiChosenAr = wrongs[Math.floor(Math.random() * wrongs.length)]?.ar || word.ar;
    if (!late && aiChosenAr === word.ar) { aiChosenAr = word.ar; }
  }

  // Update last round result
  if (roundResults.length > 0) {
    const last = roundResults[roundResults.length - 1];
    if (last.round === currentRound + (late ? 0 : 1)) {
      last.aiAr = aiChosenAr;
      last.aiOk = (aiChosenAr === word.ar);
      if (!late && aiCorrect) {
        last.aiOk = true;
      }
    }
  }

  // Flash AI button
  const aiIdx = currentChoices.findIndex(c => c.ar === aiChosenAr);
  if (aiIdx >= 0 && !late) {
    const btn = document.getElementById(`btn-${aiIdx}`);
    if (btn) btn.classList.add('ai-picked');
  }

  // Show message
  const msg = document.getElementById('ai-message');
  msg.textContent = aiCorrect ? '🤖 AI answered correctly!' : '🤖 AI answered!';
  setTimeout(() => { if (msg) msg.textContent = ''; }, 1000);
}

function updateCarPositions() {
  const total = roundedWords.length || 1;
  const youPct = (playerScore / total) * 82;
  const aiPct = (aiScore / total) * 82;
  document.getElementById('car-you').style.left = youPct + '%';
  document.getElementById('car-ai').style.left = aiPct + '%';
}

// ===================== RESULTS =====================
function showResults() {
  clearGameTimers();
  playSound('levelComplete');

  const total = roundedWords.length;
  const stars = calcStars(playerScore, total);
  saveProgress(GAME_ID, currentLevel, stars);

  // Determine winner
  let emoji, title, subtitle;
  if (playerScore > aiScore) {
    emoji = '🏆'; title = 'You Win!'; subtitle = `You beat the AI ${playerScore} to ${aiScore}!`;
  } else if (playerScore === aiScore) {
    emoji = '🤝'; title = "It's a Tie!"; subtitle = `Both you and the AI scored ${playerScore}!`;
  } else {
    emoji = '😤'; title = 'AI Wins This Time'; subtitle = `Keep practicing! AI: ${aiScore}, You: ${playerScore}`;
  }

  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-subtitle').textContent = subtitle;
  document.getElementById('rs-you').textContent = `${playerScore}/${total}`;
  document.getElementById('rs-ai').textContent = aiScore;

  const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
  document.getElementById('stars-display').textContent = starStr;

  // Table
  const table = document.getElementById('results-table');
  let html = `<thead><tr>
    <th>#</th><th>English</th><th>Your Answer</th><th>AI's Answer</th><th>Correct</th><th>You</th><th>AI</th>
  </tr></thead><tbody>`;
  roundResults.forEach(r => {
    html += `<tr>
      <td>${r.round}</td>
      <td>${r.en}</td>
      <td class="aramaic-cell">${r.playerAr || '—'}</td>
      <td class="aramaic-cell">${r.aiAr || '—'}</td>
      <td class="aramaic-cell">${r.correctAr}</td>
      <td class="${r.playerOk ? 'ok' : 'fail'}">${r.playerOk ? '✓' : '✗'}</td>
      <td class="${r.aiOk ? 'ok' : 'fail'}">${r.aiOk === true ? '✓' : r.aiOk === false ? '✗' : '—'}</td>
    </tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;

  // Next level button
  const nextBtn = document.getElementById('next-level-btn');
  if (currentLevel < 4 && isUnlocked(GAME_ID, currentLevel + 1)) {
    nextBtn.style.display = 'inline-block';
  } else if (currentLevel < 4 && stars > 0) {
    nextBtn.style.display = 'inline-block'; // newly unlocked
  } else {
    nextBtn.style.display = currentLevel < 4 ? 'inline-block' : 'none';
  }

  // Update badge
  const badge = document.getElementById('level-badge');
  badge.textContent = `Level ${currentLevel} — ${levelData.title}`;
  badge.style.background = LEVEL_COLORS[currentLevel];
  badge.style.display = 'block';

  showScreen('screen-results');
}

function playAgain() {
  startLevel(currentLevel);
}

function nextLevel() {
  if (currentLevel < 4) {
    startLevel(currentLevel + 1);
  }
}

// ===================== URL ROUTING =====================
function init() {
  const params = new URLSearchParams(window.location.search);
  const lvl = parseInt(params.get('level'));
  if (lvl && lvl >= 1 && lvl <= 4 && isUnlocked(GAME_ID, lvl)) {
    startLevel(lvl);
  } else {
    renderLevelSelect();
    showScreen('screen-levels');
  }
}

init();
</script>
