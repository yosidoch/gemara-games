<!DOCTYPE html>
<html lang="he">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Rubik', sans-serif; }
    body { background: linear-gradient(180deg, #dbeafe 0%, #eff6ff 100%); display: flex; flex-direction: column; }

    #topBar {
      position: fixed; top: 0; left: 0; right: 0; height: 32px;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(4px);
      display: flex; align-items: center; padding: 0 12px; z-index: 100;
      border-bottom: 1px solid rgba(37,99,235,0.15);
    }
    #topBar a { font-size: 0.78rem; color: #2563eb; text-decoration: none; font-weight: 600; }
    #topBar a:hover { text-decoration: underline; }

    #canvasWrap { position: relative; flex: 1; margin-top: 32px; overflow: hidden; }
    canvas { display: block; width: 100%; height: 100%; }

    /* HUD */
    #hud {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none; z-index: 10;
    }
    #hudLives { position: absolute; top: 10px; left: 14px; font-size: 1.3rem; }
    #hudWord {
      position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
      font-size: 1.05rem; font-weight: 700; color: #1e293b;
      background: rgba(255,255,255,0.88); padding: 4px 14px; border-radius: 20px;

    }
    #hudProgress {

    }

    .levelGrid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 420px; }
    .levelTile {
      border-radius: 18px; padding: 18px 14px; text-align: center; cursor: pointer;

function getProgress() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
function saveProgress(gameId, level, stars) {
  const p = getProgress();
  if (!p[gameId]) p[gameId] = {};
  if (!p[gameId][level] || stars > p[gameId][level]) p[gameId][level] = stars;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}
function isUnlocked(gameId, level) {
  if (level === 1) return true;
  const p = getProgress();
  return !!(p[gameId] && p[gameId][level-1] > 0);
}
function calcStars(correct, total) {
  const pct = correct / total;
  if (pct >= 0.9) return 3; if (pct >= 0.6) return 2; return 1;
}

const ENEMY_COUNTS = {1:3,2:3,3:4,4:4};
const ENEMY_PASTELS = ['#bfdbfe','#bbf7d0','#fde68a','#fbcfe8','#ddd6fe','#a5f3fc'];

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'shoot') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sawtooth'; o.frequency.setValueAtTime(400,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+0.12);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
      o.start(); o.stop(ctx.currentTime+0.12);
    } else if (type === 'correct') {
      [523,659,784].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0.2,ctx.currentTime+i*0.1);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.2);
        o.start(ctx.currentTime+i*0.1);o.stop(ctx.currentTime+i*0.1+0.25);
      });
    } else if (type === 'wrong') {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='square';o.frequency.setValueAtTime(180,ctx.currentTime);
      o.frequency.setValueAtTime(140,ctx.currentTime+0.1);
      g.gain.setValueAtTime(0.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
      o.start();o.stop(ctx.currentTime+0.25);
    } else if (type === 'levelComplete') {
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0.25,ctx.currentTime+i*0.18);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.35);
        o.start(ctx.currentTime+i*0.18);o.stop(ctx.currentTime+i*0.18+0.4);
      });
    } else if (type === 'pop') {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(700,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.08);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
      o.start();o.stop(ctx.currentTime+0.08);
    }
  } catch(e) {}
}

const ctx2 = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');
const controls = document.getElementById('controls');
const hud = document.getElementById('hud');

let levelData = null;
let gameState = 'levelSelect'; // levelSelect | start | playing | results

// Game objects
let player, bullets, enemies, particles, stars;
let roundIndex, shuffledWords, lives, results;
let keys = {};
let lastTime = 0;
let lastShot = 0;
let flashOverlay = null; // {color, until}
let fontsReady = false;

function resizeCanvas() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}

// ——— Level Select ———
function buildLevelSelect() {
  const grid = document.getElementById('levelGrid');
  grid.innerHTML = '';
  const p = getProgress();
  [1,2,3,4].forEach(lv => {
    const unlocked = isUnlocked(GAME_ID, lv);
    const stars = p[GAME_ID] && p[GAME_ID][lv] ? p[GAME_ID][lv] : 0;
    const starStr = '★'.repeat(stars) + '☆'.repeat(3-stars);
    const tile = document.createElement('div');
    tile.className = 'levelTile' + (unlocked ? '' : ' locked');
    tile.style.background = LEVEL_COLORS[lv];
    tile.innerHTML = `<div class="levelNum">Level ${lv}</div>
      <div class="levelTitle">${LEVELS_DATA[lv].title}</div>
      <div class="stars">${starStr}</div>
      ${unlocked ? '' : '<div class="lockIcon">🔒</div>'}`;
    if (unlocked) tile.addEventListener('click', () => initLevel(lv));
    grid.appendChild(tile);
  });
}

// ——— Init Level ———
function initLevel(lv) {
  currentLevel = lv;
  levelData = LEVELS_DATA[lv];
  document.getElementById('levelSelect').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.getElementById('startTitle').textContent = `Level ${lv}: ${levelData.title}`;
  document.getElementById('startSubtitle').textContent = `${levelData.words.length} words · 3 lives · ${levelData.enemySpeed} enemy speed`;
  gameState = 'start';
}

function startGame() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('resultsScreen').classList.add('hidden');
  controls.classList.remove('hidden');
  hud.classList.remove('hidden');
  resizeCanvas();

  shuffledWords = shuffle([...levelData.words]);
  roundIndex = 0;
  lives = 3;
  results = [];
  lastShot = 0;
  flashOverlay = null;

  // Stars
  stars = buildStars();

  // Player
  player = { x: canvas.width/2, y: canvas.height - 60, speed: 280 };

  // Bullets
  bullets = [];

  // Enemies
  enemies = [];
  spawnEnemies();

  gameState = 'playing';
  updateHUD();
  lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// ——— Stars background ———
function buildStars() {
  const s = [];
  for (let i = 0; i < 30; i++) {
    s.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height,
      r: Math.random()*1.5+0.5, speed: Math.random()*20+10 });
  }
  return s;
}

// ——— Shuffle ———
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ——— Enemy spawning ———
function spawnEnemies() {
  const count = ENEMY_COUNTS[currentLevel];
  enemies = [];
  const wordPool = levelData.words;
  const targetWord = shuffledWords[roundIndex];
  const otherWords = wordPool.filter(w => w.ar !== targetWord.ar);
  shuffle(otherWords);

  for (let i = 0; i < count; i++) {
    const word = i === 0 ? targetWord : otherWords[(i-1) % otherWords.length];
    const xMin = 50, xMax = canvas.width - 50;
    enemies.push({
      x: xMin + Math.random()*(xMax-xMin),
      y: -60 - i * 120,
      word: word.ar,
      color: ENEMY_PASTELS[i % ENEMY_PASTELS.length],
      w: 90, h: 50
    });
  }
  shuffle(enemies); // randomize which enemy is on screen first (target not always left)
}

// ——— HUD ———
function updateHUD() {
  const heartsEl = document.getElementById('hudLives');
  heartsEl.innerHTML = Array.from({length:3},(_,i)=>
    `<span style="color:${i<lives?'#ef4444':'#94a3b8'};margin-right:2px">♥</span>`
  ).join('');
  const wordEl = document.getElementById('hudWord');
  if (roundIndex < shuffledWords.length)
    wordEl.textContent = `Shoot: ${shuffledWords[roundIndex].en}`;
  const progEl = document.getElementById('hudProgress');
  progEl.textContent = `${roundIndex+1} / ${shuffledWords.length}`;
}

// ——— Game Loop ———
function gameLoop(ts) {
  if (gameState !== 'playing') return;
  const dt = Math.min((ts - lastTime)/1000, 0.1);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

function update(dt) {
  // Move player
  if (keys['ArrowLeft'] || keys['left']) player.x -= player.speed * dt;
  if (keys['ArrowRight'] || keys['right']) player.x += player.speed * dt;
  player.x = Math.max(20, Math.min(canvas.width-20, player.x));

  // Move stars
  stars.forEach(s => {
    s.y += s.speed * dt;
    if (s.y > canvas.height) { s.y = -5; s.x = Math.random()*canvas.width; }
  });

  // Move bullets
  const bSpeed = levelData.bulletSpeed;
  bullets.forEach(b => {
    b.x += b.vx * bSpeed * dt;
    b.y -= bSpeed * dt;
    b.trail.push({x:b.x, y:b.y, age:0});
    if (b.trail.length > 8) b.trail.shift();
    b.trail.forEach(t => t.age += dt);
  });
  bullets = bullets.filter(b => b.y > -20);

  // Move enemies
  const eSpeed = levelData.enemySpeed;
  enemies.forEach(e => {
    e.y += eSpeed * dt;
    if (e.y > canvas.height + 60) {
      e.y = -60;
      e.x = 50 + Math.random()*(canvas.width-100);
    }
  });

  // Bullet-enemy collision
  let hitThisFrame = false;
  for (let bi = bullets.length-1; bi >= 0; bi--) {
    if (hitThisFrame) break;
    const b = bullets[bi];
    for (let ei = enemies.length-1; ei >= 0; ei--) {
      const e = enemies[ei];
      if (b.x > e.x-e.w/2 && b.x < e.x+e.w/2 && b.y > e.y-e.h/2 && b.y < e.y+e.h/2) {
        hitThisFrame = true;
        const target = shuffledWords[roundIndex];
        const correct = e.word === target.ar;
        results.push({en: target.en, correct: target.ar, shot: e.word, ok: correct});
        if (correct) {
          playSound('correct');
          flashOverlay = {color:'rgba(0,200,0,0.15)', until: performance.now()+300};
          spawnParticles(b.x, e.y, '#facc15', 8);
        } else {
          playSound('wrong');
          flashOverlay = {color:'rgba(255,0,0,0.15)', until: performance.now()+300};
          spawnParticles(b.x, e.y, '#ef4444', 8);
          lives--;
        }
        bullets.splice(bi, 1);
        roundIndex++;
        if (roundIndex >= shuffledWords.length) {
          setTimeout(endGame, 400);
          return;
        }
        spawnEnemies();
        updateHUD();
        break;
      }
    }
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx * dt; p.y += p.vy * dt; p.life -= dt;
  });
  particles = particles.filter(p => p.life > 0);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = 100 + Math.random()*120;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,color,life:0.5,maxLife:0.5});
  }
}

function draw() {
  const W = canvas.width, H = canvas.height;
  ctx2.clearRect(0,0,W,H);

  // Background gradient
  const grad = ctx2.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#dbeafe'); grad.addColorStop(1,'#eff6ff');
  ctx2.fillStyle = grad; ctx2.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s => {
    ctx2.beginPath(); ctx2.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx2.fillStyle = 'rgba(147,197,253,0.7)'; ctx2.fill();
  });

  // Enemies
  enemies.forEach(e => {
    ctx2.save();
    roundRect(ctx2, e.x-e.w/2, e.y-e.h/2, e.w, e.h, 12);
    ctx2.fillStyle = e.color; ctx2.fill();
    ctx2.strokeStyle = '#64748b'; ctx2.lineWidth = 1.5; ctx2.stroke();
    ctx2.restore();

    ctx2.save();
    ctx2.font = "16px 'Frank Ruhl Libre', serif";
    ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
    ctx2.fillStyle = '#1e293b'; ctx2.fillText(e.word, e.x, e.y);
    ctx2.restore();
  });

  // Bullet trails
  bullets.forEach(b => {
    b.trail.forEach((t,i) => {
      const alpha = (1-t.age/0.25)*(i/b.trail.length)*0.5;
      ctx2.beginPath(); ctx2.arc(t.x,t.y,3,0,Math.PI*2);
      ctx2.fillStyle = `rgba(250,204,21,${Math.max(0,alpha)})`; ctx2.fill();
    });
    ctx2.beginPath(); ctx2.arc(b.x,b.y,5,0,Math.PI*2);
    ctx2.fillStyle = '#facc15'; ctx2.fill();
    ctx2.strokeStyle = '#ca8a04'; ctx2.lineWidth = 1; ctx2.stroke();
  });

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx2.beginPath(); ctx2.arc(p.x,p.y,4*alpha,0,Math.PI*2);
    ctx2.fillStyle = p.color + Math.floor(alpha*255).toString(16).padStart(2,'0');
    ctx2.fill();
  });

  // Player ship
  drawShip(player.x, player.y);

  // Flash overlay
  if (flashOverlay && performance.now() < flashOverlay.until) {
    ctx2.fillStyle = flashOverlay.color;
    ctx2.fillRect(0,0,W,H);
  }
}

function drawShip(x, y) {
  ctx2.save();
  ctx2.translate(x, y);

  // Engine glow
  const glow = ctx2.createRadialGradient(0,12,2,0,12,18);
  glow.addColorStop(0,'rgba(96,165,250,0.6)'); glow.addColorStop(1,'rgba(96,165,250,0)');
  ctx2.fillStyle = glow; ctx2.beginPath(); ctx2.arc(0,14,18,0,Math.PI*2); ctx2.fill();

  // Wings
  ctx2.fillStyle = '#1d4ed8';
  ctx2.beginPath(); ctx2.moveTo(0,-20); ctx2.lineTo(-28,10); ctx2.lineTo(-12,6); ctx2.closePath(); ctx2.fill();
  ctx2.beginPath(); ctx2.moveTo(0,-20); ctx2.lineTo(28,10); ctx2.lineTo(12,6); ctx2.closePath(); ctx2.fill();

  // Body
  ctx2.fillStyle = '#2563eb';
  ctx2.beginPath(); ctx2.moveTo(0,-26); ctx2.lineTo(14,14); ctx2.lineTo(0,8); ctx2.lineTo(-14,14); ctx2.closePath(); ctx2.fill();

  // Cockpit
  ctx2.fillStyle = '#bfdbfe';
  ctx2.beginPath(); ctx2.ellipse(0,-8,5,8,0,0,Math.PI*2); ctx2.fill();

  ctx2.restore();
}

function roundRect(ctx, x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
  ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
  ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r);
  ctx.closePath();
}

// ——— Shoot ———
function shoot() {
  const now = performance.now();
  if (now - lastShot < 350) return;
  lastShot = now;
  playSound('shoot');
  bullets.push({x:player.x, y:player.y-28, vx:0, trail:[]});
}

// ——— End game ———
function endGame() {
  gameState = 'results';
  controls.classList.add('hidden');
  hud.classList.add('hidden');
  playSound('levelComplete');

  const correct = results.filter(r=>r.ok).length;
  const total = results.length;
  const stars = calcStars(correct, total);
  saveProgress(GAME_ID, currentLevel, stars);

  document.getElementById('resultsTitle').textContent =
    correct === total ? `Level ${currentLevel} Complete! 🎉` : `Level ${currentLevel} Done`;
  document.getElementById('starsRow').textContent = '★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('scoreLabel').textContent = `${correct} / ${total} correct`;

  const tbody = document.getElementById('resultsTbody');
  tbody.innerHTML = '';
  results.forEach((r,i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${i+1}</td><td style="text-align:left">${r.en}</td>
      <td style="font-family:'Frank Ruhl Libre',serif">${r.correct}</td>
      <td style="font-family:'Frank Ruhl Libre',serif">${r.shot}</td>
      <td class="${r.ok?'ok':'bad'}">${r.ok?'✓':'✗'}</td>`;
    tbody.appendChild(tr);
  });

  const btnRow = document.getElementById('btnRow');
  btnRow.innerHTML = '';
  const replayBtn = document.createElement('button');
  replayBtn.className = 'btnBlue'; replayBtn.textContent = '↺ Play Again';
  replayBtn.onclick = () => { document.getElementById('resultsScreen').classList.add('hidden'); startGame(); };
  btnRow.appendChild(replayBtn);

  const levBtn = document.createElement('button');
  levBtn.className = 'btnGrey'; levBtn.textContent = '⬛ Levels';
  levBtn.onclick = showLevelSelect;
  btnRow.appendChild(levBtn);

  if (currentLevel < 4 && isUnlocked(GAME_ID, currentLevel+1)) {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btnGreen'; nextBtn.textContent = `Level ${currentLevel+1} →`;
    nextBtn.onclick = () => { document.getElementById('resultsScreen').classList.add('hidden'); initLevel(currentLevel+1); };
    btnRow.appendChild(nextBtn);
  }

  document.getElementById('resultsScreen').classList.remove('hidden');
}

function showLevelSelect() {
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.add('hidden');
  hud.classList.add('hidden');
  controls.classList.add('hidden');
  buildLevelSelect();
  document.getElementById('levelSelect').classList.remove('hidden');
  gameState = 'levelSelect';
}

// ——— Input ———
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === 'start') startGame();
    else if (gameState === 'playing') shoot();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnFire = document.getElementById('btnFire');

['touchstart','mousedown'].forEach(ev => {
  btnLeft.addEventListener(ev, e => { e.preventDefault(); keys['left']=true; }, {passive:false});
  btnRight.addEventListener(ev, e => { e.preventDefault(); keys['right']=true; }, {passive:false});
  btnFire.addEventListener(ev, e => { e.preventDefault(); if(gameState==='playing') shoot(); }, {passive:false});
});
['touchend','mouseup'].forEach(ev => {
  btnLeft.addEventListener(ev, () => keys['left']=false);
  btnRight.addEventListener(ev, () => keys['right']=false);
});
document.getElementById('startBtn').addEventListener('click', () => {
  if (gameState === 'start') startGame();
});

// ——— Resize ———
window.addEventListener('resize', () => {
  if (gameState === 'playing') {
    resizeCanvas();
    player.y = canvas.height - 60;
    stars = buildStars();
    spawnEnemies();
  }
});

// ——— Init ———
const particles_init = [];
particles = particles_init;

function init() {
  const params = new URLSearchParams(location.search);
  const lvParam = parseInt(params.get('level'));
  if (lvParam && [1,2,3,4].includes(lvParam) && isUnlocked(GAME_ID, lvParam)) {
    initLevel(lvParam);
  } else {
    buildLevelSelect();
    document.getElementById('levelSelect').classList.remove('hidden');
  }
}

document.fonts.ready.then(() => { fontsReady = true; init(); });
</script>
