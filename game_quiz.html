    --indigo-light: #818cf8;
    --indigo-dark: #3730a3;
    --gold: #fbbf24;
    --gold-dark: #d97706;
    --green: #22c55e;
    --red: #ef4444;
    --l1: #22c55e;
    --l2: #3b82f6;
    --l3: #f59e0b;
    --l4: #ef4444;
  }

  body {
    font-family: 'Rubik', sans-serif;
    background: linear-gradient(135deg, #f0f0ff 0%, #fff8f0 100%);
    min-height: 100vh;
    color: #1e1b4b;
    overflow-x: hidden;
  }

  .back-link {
    position: fixed;
    top: 14px;
    left: 16px;
    color: #6366f1;
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    z-index: 100;
    transition: color 0.2s;
    background: rgba(255,255,255,0.85);
    padding: 6px 12px;
    border-radius: 20px;
    box-shadow: 0 1px 6px rgba(79,70,229,0.12);
  }
  .back-link:hover { color: var(--indigo-dark); }

  /* ── LEVEL SELECT ── */
  #screen-select {
    max-width: 700px;
    margin: 0 auto;
    padding: 80px 20px 40px;
  }

  .game-title {
    text-align: center;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    color: var(--indigo);
    margin-bottom: 4px;
  }
  .game-subtitle {
    text-align: center;
    color: #6366f1;
    font-size: 0.95rem;
    margin-bottom: 40px;
  }

  .levels-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  @media (max-width: 480px) {
    .levels-grid { grid-template-columns: 1fr; }
  }

  .level-card {
    background: #fff;
    border-radius: 16px;
    padding: 22px 20px;
    box-shadow: 0 2px 12px rgba(79,70,229,0.1);
    cursor: pointer;
    transition: transform 0.18s, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
    border: 2px solid transparent;
    text-decoration: none;
    display: block;
  }
  .level-card:hover:not(.locked) {
    transform: translateY(-3px);
    box-shadow: 0 6px 24px rgba(79,70,229,0.18);
  }
  .level-card.locked {
    opacity: 0.55;
    cursor: not-allowed;
    filter: grayscale(0.4);
  }

  .level-badge {
    display: inline-block;
    width: 36px; height: 36px;
    border-radius: 50%;
    color: #fff;
    font-weight: 700;
    font-size: 1rem;
    line-height: 36px;
    text-align: center;
    margin-bottom: 10px;
  }

  .level-card-title {
    font-weight: 700;
    font-size: 1rem;
    color: #1e1b4b;
    margin-bottom: 4px;
  }
  .level-card-sub {
    font-size: 0.78rem;
    color: #6b7280;
    margin-bottom: 12px;
    line-height: 1.4;
  }

  .stars-row {
    display: flex;
    gap: 4px;
    font-size: 1.2rem;
  }
  .star { color: #d1d5db; transition: color 0.2s; }
  .star.earned { color: var(--gold); }

  .lock-icon {
    font-size: 1.5rem;
    display: block;
    margin-top: 6px;
  }

  /* ── GAME SCREEN ── */
  #screen-game {
    max-width: 640px;
    margin: 0 auto;
    padding: 70px 16px 40px;
  }

  .level-banner {
    text-align: center;
    font-size: 0.9rem;
    font-weight: 600;
    color: #fff;
    padding: 8px 20px;
    border-radius: 24px;
    display: inline-block;
    margin-bottom: 20px;
  }
  .banner-wrap { text-align: center; }

  .progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
    font-size: 0.85rem;
    color: #4338ca;
    font-weight: 500;
  }
  .progress-bar-outer {
    height: 8px;
    background: #e0e7ff;
    border-radius: 8px;
    overflow: hidden;
    margin-bottom: 18px;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, var(--indigo), var(--indigo-light));

    transition: width 0.4s ease;

  .quiz-card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 24px rgba(79,70,229,0.12);

    position: relative;

  .question-label {
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: #a5b4fc;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .question-text {
    font-size: clamp(1.5rem, 5vw, 2.4rem);
    font-weight: 700;
    color: #1e1b4b;
    text-align: center;
    margin-bottom: 8px;

  }

    text-align: center;

    font-family: 'Rubik', sans-serif;
    font-weight: 700;
    font-size: 14px;
    fill: #4338ca;
    dominant-baseline: middle;
    text-anchor: middle;

    display: grid;

    gap: 10px;
    margin-top: 4px;

    border-color: var(--red);

    margin-top: 12px;

// ── CONSTANTS ──
const STORAGE_KEY = 'gemara_bm_progress';
const GAME_ID = 'quiz';

// ── PROGRESS HELPERS ──
function getProgress() {
  return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
}
function saveProgress(gameId, level, stars) {
  const p = getProgress();
  if (!p[gameId]) p[gameId] = {};
  if (!p[gameId][level] || stars > p[gameId][level]) {
    p[gameId][level] = stars;
  }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}
function isUnlocked(gameId, level) {
  if (level === 1) return true;
  const p = getProgress();
  return p[gameId] && p[gameId][level - 1] > 0;
}
function calcStars(correct, total) {
  const pct = correct / total;
  if (pct >= 0.9) return 3;
  if (pct >= 0.6) return 2;
  return 1;
}
function getStarsFor(gameId, level) {
  const p = getProgress();
  return (p[gameId] && p[gameId][level]) || 0;
}

      { ar: "כּוּבֵּי וְכָסֵי", en: "cups and bowls" },
      { ar: "סַכִּינֵי וְהֶמְנֵיק", en: "knives and a belt" },
      { ar: "עֲשׂוּיָה לִפַּנּוֹת", en: "meant to be cleared out" },
      { ar: "אֵינָהּ עֲשׂוּיָה לִפַּנּוֹת", en: "not meant to be cleared out" },
      { ar: "אֲבֵידָה מִדַּעַת", en: "an intentional loss" }
    ]
  }
};

const LEVEL_COLORS = { 1: '#22c55e', 2: '#3b82f6', 3: '#f59e0b', 4: '#ef4444' };

// ── SOUND ──
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.type = 'sine';
      osc.frequency.setValueAtTime(523, ctx.currentTime);
      osc.frequency.setValueAtTime(659, ctx.currentTime + 0.12);
      osc.frequency.setValueAtTime(784, ctx.currentTime + 0.25);
      gain.gain.setValueAtTime(0.3, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
      osc.start(); osc.stop(ctx.currentTime + 0.5);
    } else if (type === 'wrong') {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(250, ctx.currentTime);
      osc.frequency.setValueAtTime(180, ctx.currentTime + 0.15);
      gain.gain.setValueAtTime(0.2, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
      osc.start(); osc.stop(ctx.currentTime + 0.3);
    } else if (type === 'levelComplete') {
      [523,659,784,1047].forEach((f,i) => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = 'sine'; o.frequency.value = f;
        g.gain.setValueAtTime(0.25, ctx.currentTime + i*0.15);
        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.15 + 0.3);
        o.start(ctx.currentTime + i*0.15); o.stop(ctx.currentTime + i*0.15 + 0.4);
      });
    } else if (type === 'tick') {
      osc.type = 'sine'; osc.frequency.value = 880;
      gain.gain.setValueAtTime(0.1, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.05);
      osc.start(); osc.stop(ctx.currentTime + 0.05);
    }
  } catch(e) {}
}

// ── UTILS ──
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function show(id) { document.getElementById(id).classList.remove('hidden'); }
function hide(id) { document.getElementById(id).classList.add('hidden'); }

// ── CONFETTI ──
function launchConfetti() {
  const canvas = document.getElementById('confetti');
  canvas.classList.remove('hidden');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#4f46e5','#fbbf24','#22c55e','#ef4444','#3b82f6','#f59e0b','#a855f7','#06b6d4'];
  const cx = canvas.width / 2, cy = canvas.height / 2;
  const particles = Array.from({length: 200}, () => ({
    x: cx, y: cy,
    vx: (Math.random() - 0.5) * 14,
    vy: (Math.random() - 0.8) * 14,
    r: Math.random() * 5 + 3,
    color: colors[Math.floor(Math.random() * colors.length)],
    alpha: 1,
    gravity: 0.35 + Math.random() * 0.2
  }));
  let frame;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    particles.forEach(p => {
      if (p.alpha <= 0) return;
      alive = true;
      p.x += p.vx; p.y += p.vy; p.vy += p.gravity;
      p.alpha -= 0.014;
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    });
    if (alive) frame = requestAnimationFrame(draw);
    else { canvas.classList.add('hidden'); cancelAnimationFrame(frame); }
  }
  draw();
}

// ── LEVEL SELECT ──
function buildLevelSelect() {
  const grid = document.getElementById('levels-grid');
  grid.innerHTML = '';
  for (let lvl = 1; lvl <= 4; lvl++) {
    const data = LEVELS_DATA[lvl];
    const unlocked = isUnlocked(GAME_ID, lvl);
    const stars = getStarsFor(GAME_ID, lvl);
    const color = LEVEL_COLORS[lvl];

    const card = document.createElement('div');
    card.className = 'level-card' + (unlocked ? '' : ' locked');

    let starsHTML = '';
    for (let s = 1; s <= 3; s++) {
      starsHTML += `<span class="star ${s <= stars ? 'earned' : ''}">★</span>`;
    }

    card.innerHTML = `
      <div class="level-badge" style="background:${color}">${lvl}</div>
      <div class="level-card-title">${data.title}</div>
      <div class="level-card-sub">${data.subtitle}</div>
      ${unlocked
        ? `<div class="stars-row">${starsHTML}</div>`
        : `<span class="lock-icon">🔒</span>`
      }
    `;

    if (unlocked) {
      card.addEventListener('click', () => {
        window.location.href = `game_quiz.html?level=${lvl}`;
      });
    }
    grid.appendChild(card);
  }
}

// ── GAME STATE ──
let currentLevel = 0;
let questions = [];
let qIndex = 0;
let score = 0;
let results = [];
let timerInterval = null;
let timeLeft = 0;
let timePerQ = 12;
let answered = false;

function buildQuestions(levelData) {
  const words = shuffle([...levelData.words]);
  return words.map((word, i) => {
    const isArToEn = (i % 2 === 0);
    return { word, isArToEn };
  });
}

function getDistractors(correctWord, allWords, isArToEn, count = 3) {
  const pool = allWords.filter(w => w !== correctWord);
  const shuffled = shuffle(pool);
  return shuffled.slice(0, count).map(w => isArToEn ? w.en : w.ar);
}

function startGame(level) {
  currentLevel = level;
  const levelData = LEVELS_DATA[level];
  timePerQ = levelData.timePerQ;
  questions = buildQuestions(levelData);
  qIndex = 0;
  score = 0;
  results = [];

  const color = LEVEL_COLORS[level];
  const banner = document.getElementById('level-banner');
  banner.textContent = `Level ${level} — ${levelData.title}`;
  banner.style.background = color;

  show('screen-game');
  loadQuestion();
}

function loadQuestion() {
  if (qIndex >= questions.length) {
    showResults();
    return;
  }

  const total = questions.length;
  const { word, isArToEn } = questions[qIndex];
  const levelData = LEVELS_DATA[currentLevel];

  answered = false;

  // Progress
  document.getElementById('q-counter').textContent = `Question ${qIndex + 1} / ${total}`;
  document.getElementById('score-counter').textContent = `Score: ${score} / ${qIndex}`;
  document.getElementById('progress-bar').style.width = `${(qIndex / total) * 100}%`;

  // Question
  const qLabel = document.getElementById('question-label');
  const qText = document.getElementById('question-text');
  const feedback = document.getElementById('feedback-msg');
  feedback.textContent = '';
  feedback.className = 'feedback-msg';

  if (isArToEn) {
    qLabel.textContent = 'What does this Aramaic term mean?';
    qText.textContent = word.ar;
    qText.className = 'question-text aramaic';
  } else {
    qLabel.textContent = 'Which Aramaic term matches this meaning?';
    qText.textContent = word.en;
    qText.className = 'question-text';
  }

  // Choices
  const correctAnswer = isArToEn ? word.en : word.ar;
  const distractors = getDistractors(word, levelData.words, isArToEn, 3);
  const choices = shuffle([correctAnswer, ...distractors]);

  const grid = document.getElementById('choices-grid');
  grid.innerHTML = '';
  choices.forEach(choice => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn' + (!isArToEn ? ' aramaic' : '');
    btn.textContent = choice;
    btn.addEventListener('click', () => handleAnswer(choice, correctAnswer, btn));
    grid.appendChild(btn);
  });

  // Timer
  startTimer();
}

function startTimer() {
  clearInterval(timerInterval);
  timeLeft = timePerQ;
  const ring = document.getElementById('timer-ring');
  const timerText = document.getElementById('timer-text');
  const circumference = 2 * Math.PI * 27; // 169.6

  ring.style.stroke = '#4f46e5';
  updateRing(timeLeft);

  timerInterval = setInterval(() => {
    timeLeft--;
    updateRing(timeLeft);

    if (timeLeft <= 3 && timeLeft > 0) {
      ring.style.stroke = '#ef4444';
      timerText.style.fill = '#ef4444';
      playSound('tick');
    }

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      if (!answered) {
        handleTimeout();
      }
    }
  }, 1000);

  function updateRing(t) {
    const pct = t / timePerQ;
    const offset = circumference * (1 - pct);
    ring.style.strokeDashoffset = offset;
    timerText.textContent = t;
    if (t > 3) {
      ring.style.stroke = '#4f46e5';
      timerText.style.fill = '#4338ca';
    }
  }
}

function handleTimeout() {
  answered = true;
  const { word, isArToEn } = questions[qIndex];
  const correctAnswer = isArToEn ? word.en : word.ar;
  const feedback = document.getElementById('feedback-msg');
  feedback.textContent = `⏰ Time's Up! Correct: ${correctAnswer}`;
  feedback.className = 'feedback-msg wrong-msg';
  playSound('wrong');

  // Mark correct button
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correctAnswer) b.classList.add('correct');
  });

  results.push({
    qNum: qIndex + 1,
    isArToEn,
    shown: isArToEn ? word.ar : word.en,
    userAnswer: '(timeout)',
    correct: correctAnswer,
    isCorrect: false
  });

  setTimeout(() => {
    qIndex++;
    loadQuestion();
  }, 1200);
}

function handleAnswer(choice, correctAnswer, btn) {
  if (answered) return;
  answered = true;
  clearInterval(timerInterval);

  const { word, isArToEn } = questions[qIndex];
  const isCorrect = choice === correctAnswer;

  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => {
    b.disabled = true;
    if (b.textContent === correctAnswer) b.classList.add('correct');
  });

  const feedback = document.getElementById('feedback-msg');

  if (isCorrect) {
    btn.classList.add('correct');
    score++;
    feedback.textContent = '✓ Correct!';
    feedback.className = 'feedback-msg correct-msg';
    playSound('correct');
  } else {
    btn.classList.add('wrong');
    feedback.textContent = `✗ Correct answer: ${correctAnswer}`;
    feedback.className = 'feedback-msg wrong-msg';
    playSound('wrong');
  }

  results.push({
    qNum: qIndex + 1,
    isArToEn,
    shown: isArToEn ? word.ar : word.en,
    userAnswer: choice,
    correct: correctAnswer,
    isCorrect
  });

  document.getElementById('score-counter').textContent = `Score: ${score} / ${qIndex + 1}`;

  setTimeout(() => {
    qIndex++;
    loadQuestion();
  }, 900);
}

function showResults() {
  clearInterval(timerInterval);
  hide('screen-game');

  const total = results.length;
  const stars = calcStars(score, total);
  saveProgress(GAME_ID, currentLevel, stars);

  // Title & score
  document.getElementById('results-title').textContent = `Level ${currentLevel} Complete!`;
  const pct = Math.round((score / total) * 100);
  document.getElementById('results-score-text').textContent = `${score} / ${total} correct (${pct}%)`;

  // Stars
  const starEls = [
    document.getElementById('star1'),
    document.getElementById('star2'),
    document.getElementById('star3')
  ];
  starEls.forEach(el => {
    el.classList.remove('show', 'earned');
  });

  starEls.forEach((el, i) => {
    setTimeout(() => {
      if (i < stars) el.classList.add('earned');
      el.classList.add('show');
    }, 300 + i * 250);
  });

  // Table
  const tbody = document.getElementById('results-tbody');
  tbody.innerHTML = '';
  results.forEach(r => {
    const tr = document.createElement('tr');
    const shownIsAramaic = r.isArToEn;
    const answerIsAramaic = !r.isArToEn;
    const correctIsAramaic = !r.isArToEn;

    tr.innerHTML = `
      <td>${r.qNum}</td>
      <td>${r.isArToEn ? 'Ar→En' : 'En→Ar'}</td>
      <td class="${shownIsAramaic ? 'aramaic-cell' : ''}">${r.shown}</td>
      <td class="${answerIsAramaic ? 'aramaic-cell' : ''}">${r.userAnswer}</td>
      <td class="${correctIsAramaic ? 'aramaic-cell' : ''}">${r.correct}</td>
      <td>${r.isCorrect ? '<span class="correct-mark">✓</span>' : '<span class="wrong-mark">✗</span>'}</td>
    `;
    tbody.appendChild(tr);
  });

  // Buttons
  const btnWrap = document.getElementById('results-buttons');
  btnWrap.innerHTML = '';

  const playAgainBtn = document.createElement('button');
  playAgainBtn.className = 'btn btn-secondary';
  playAgainBtn.textContent = 'Play Again';
  playAgainBtn.addEventListener('click', () => {
    hide('screen-results');
    startGame(currentLevel);
  });
  btnWrap.appendChild(playAgainBtn);

  if (currentLevel < 4 && isUnlocked(GAME_ID, currentLevel + 1)) {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btn btn-gold';
    nextBtn.textContent = `Next Level →`;
    nextBtn.addEventListener('click', () => {
      hide('screen-results');
      window.location.href = `game_quiz.html?level=${currentLevel + 1}`;
    });
    btnWrap.appendChild(nextBtn);
  }

  const backBtn = document.createElement('button');
  backBtn.className = 'btn btn-primary';
  backBtn.textContent = 'Back to Levels';
  backBtn.addEventListener('click', () => {
    window.location.href = 'game_quiz.html';
  });
  btnWrap.appendChild(backBtn);

  show('screen-results');

  setTimeout(() => {
    playSound('levelComplete');
    launchConfetti();
  }, 600);
}

// ── ROUTER ──
function init() {
  const params = new URLSearchParams(location.search);
  const levelParam = params.get('level');

  if (!levelParam) {
    show('screen-select');
    buildLevelSelect();
    return;
  }

  const level = parseInt(levelParam, 10);
  if (![1,2,3,4].includes(level) || !isUnlocked(GAME_ID, level)) {
    window.location.href = 'game_quiz.html';
    return;
  }

  startGame(level);
}

init();
</script>
