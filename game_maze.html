<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maze Navigator — Gemara BM Vocabulary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;900&family=Frank+Ruhl+Libre:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --amber: #d97706;
    --amber-light: #f59e0b;
    --amber-pale: #fffbeb;
    --amber-soft: #fef3c7;
    --amber-dark: #92400e;
    --green: #16a34a;
    --red: #ef4444;
    --gray: #6b7280;
  }

  body {
    font-family: 'Rubik', sans-serif;
    background: linear-gradient(135deg, #fffbeb 0%, #fef3c7 100%);
    min-height: 100vh;
    color: #1f2937;
  }

  /* ===================== TOP BAR ===================== */
  #top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid #fde68a;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  #back-btn {
    font-family: 'Rubik', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: var(--amber);
    cursor: pointer;
    background: none;
    border: 2px solid var(--amber);
    border-radius: 8px;
    padding: 6px 14px;
    transition: all 0.2s;
  }
  #back-btn:hover { background: var(--amber); color: #fff; }
  #game-title-bar { font-size: 18px; font-weight: 700; color: var(--amber-dark); }
  #level-badge {
    font-size: 12px;
    font-weight: 700;
    padding: 4px 12px;
    border-radius: 20px;
    color: #fff;
    display: none;
  }

  /* ===================== SCREENS ===================== */
  .screen { display: none; padding: 16px; max-width: 900px; margin: 0 auto; }
  .screen.active { display: block; }

  /* ===================== LEVEL SELECT ===================== */
  #screen-levels h1 {
    font-size: 30px;
    font-weight: 900;
    color: var(--amber-dark);
    text-align: center;
    margin: 28px 0 8px;
  }
  #screen-levels p.sub {
    text-align: center;
    color: var(--gray);
    margin-bottom: 30px;
    font-size: 15px;
  }
  #levels-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    max-width: 760px;
    margin: 0 auto;
  }
  .level-tile {
    border-radius: 16px;
    padding: 24px 16px;
    text-align: center;
    cursor: pointer;
    border: 3px solid transparent;
    transition: all 0.25s;
    color: #fff;
    user-select: none;
  }
  .level-tile:hover:not(.locked) { transform: translateY(-4px); box-shadow: 0 12px 28px rgba(0,0,0,0.18); }
  .level-tile.locked { filter: grayscale(0.6); opacity: 0.65; cursor: not-allowed; }
  .level-tile .lnum { font-size: 13px; font-weight: 600; opacity: 0.85; margin-bottom: 4px; }
  .level-tile .ltitle { font-size: 17px; font-weight: 800; margin-bottom: 2px; }
  .level-tile .lsub { font-size: 12px; opacity: 0.8; margin-bottom: 10px; }
  .level-tile .stars { font-size: 22px; letter-spacing: 3px; }
  .level-tile .lock-icon { font-size: 30px; margin-bottom: 6px; }
  .level-tile[data-level="1"] { background: #16a34a; }
  .level-tile[data-level="2"] { background: #3b82f6; }
  .level-tile[data-level="3"] { background: #f59e0b; }
  .level-tile[data-level="4"] { background: #ef4444; }

  /* ===================== START SCREEN ===================== */
  #screen-start {
    text-align: center;
    padding-top: 40px;
  }
  #start-icon { font-size: 60px; margin-bottom: 12px; }
  #start-level-title { font-size: 26px; font-weight: 900; color: var(--amber-dark); margin-bottom: 6px; }
  #start-level-sub { font-size: 15px; color: var(--gray); margin-bottom: 10px; }
  #start-level-info {
    display: inline-block;
    background: var(--amber-soft);
    border: 2px solid var(--amber-light);
    border-radius: 12px;
    padding: 12px 24px;
    margin-bottom: 28px;
    font-size: 14px;
    color: var(--amber-dark);
    font-weight: 600;
  }
  #start-btn {
    font-family: 'Rubik', sans-serif;
    font-size: 18px;
    font-weight: 800;
    background: var(--amber);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 16px 48px;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 4px 14px rgba(217,119,6,0.35);
  }
  #start-btn:hover { background: var(--amber-dark); transform: translateY(-2px); }

  /* ===================== GAME SCREEN ===================== */
  #screen-game { padding: 8px 12px; max-width: 100%; }

  #game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 6px;
  }
  #round-indicator {
    font-size: 13px;
    font-weight: 700;
    color: var(--gray);
    background: rgba(255,255,255,0.8);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid #e5e7eb;
  }
  #prompt-area {
    background: #fff;
    border: 2px solid var(--amber-light);
    border-radius: 14px;
    padding: 12px 18px;
    text-align: center;
    margin-bottom: 8px;
    box-shadow: 0 2px 8px rgba(217,119,6,0.1);
  }
  #prompt-label {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--amber);
    margin-bottom: 4px;
  }
  #prompt-english {
    font-size: 22px;
    font-weight: 800;
    color: #111827;
    line-height: 1.2;
  }

  /* Canvas wrapper */
  #canvas-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 8px;
    position: relative;
  }
  #maze-canvas {
    border-radius: 8px;
    border: 2px solid var(--amber-dark);
    display: block;
    background: #fef9ee;
  }

  /* Flash message overlay */
  #flash-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 20px;
    font-weight: 800;
    padding: 14px 28px;
    border-radius: 16px;
    color: #fff;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    z-index: 200;
    text-align: center;
    max-width: 90vw;
    font-family: 'Frank Ruhl Libre', serif;
  }
  #flash-msg.visible { opacity: 1; }

  /* Confirm hint */
  #confirm-hint {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: var(--amber-dark);
    margin-bottom: 8px;
    height: 20px;
  }
  #confirm-hint.pulse {
    animation: hint-pulse 0.6s ease;
  }
  @keyframes hint-pulse {
    0%,100% { color: var(--amber-dark); }
    50% { color: var(--amber); font-size: 14px; }
  }

  /* D-Pad */
  #dpad {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin: 0 auto;
    max-width: 260px;
  }
  .dpad-row {
    display: flex;
    gap: 4px;
    justify-content: center;
  }
  .dpad-btn {
    font-family: 'Rubik', sans-serif;
    font-size: 20px;
    font-weight: 700;
    width: 56px;
    height: 56px;
    border: 2.5px solid var(--amber);
    background: #fff;
    color: var(--amber-dark);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .dpad-btn:hover, .dpad-btn:active {
    background: var(--amber);
    color: #fff;
    transform: scale(0.95);
  }
  .dpad-spacer { width: 56px; height: 56px; }

  #confirm-btn {
    font-family: 'Rubik', sans-serif;
    font-size: 14px;
    font-weight: 800;
    padding: 12px 30px;
    background: var(--amber);
    color: #fff;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 6px;
    letter-spacing: 0.5px;
    touch-action: manipulation;
  }
  #confirm-btn:hover { background: var(--amber-dark); transform: scale(0.97); }

  /* ===================== RESULTS ===================== */
  #screen-results { text-align: center; }
  #results-header { margin: 22px 0 14px; }
  #results-emoji { font-size: 52px; margin-bottom: 8px; }
  #results-title { font-size: 26px; font-weight: 900; color: var(--amber-dark); margin-bottom: 4px; }
  #results-subtitle { font-size: 15px; color: var(--gray); }
  #stars-display {

    letter-spacing: 8px;
    margin: 12px 0 20px;
    color: var(--amber);
  }
  #results-score {
    font-size: 18px;
    font-weight: 700;
    color: var(--amber-dark);
    margin-bottom: 18px;
  }
  #results-table-wrap {
    overflow-x: auto;
    margin: 0 auto 24px;
    max-width: 820px;
  }
  #results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
    text-align: left;
  }
  #results-table th {
    background: var(--amber);
    color: #fff;
    padding: 10px 12px;
    font-weight: 700;
    font-size: 13px;
  }
  #results-table td {
    padding: 9px 12px;
    border-bottom: 1px solid #fde68a;
    vertical-align: middle;
  }
  #results-table tr:nth-child(even) td { background: #fffbeb; }
  #results-table .aramaic-cell {
    font-family: 'Frank Ruhl Libre', serif;
    font-size: 16px;
    direction: rtl;
    text-align: right;
  }
  #results-table .ok { color: var(--green); font-weight: 700; font-size: 16px; }
  #results-table .fail { color: var(--red); font-weight: 700; font-size: 16px; }
  #results-btns {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 12px;
    margin-bottom: 30px;
  }
  .results-btn {
    font-family: 'Rubik', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 12px 24px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .results-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.15); }
  .btn-amber { background: var(--amber); color: #fff; }
  .btn-amber-dark { background: var(--amber-dark); color: #fff; }
  .btn-gray { background: #e5e7eb; color: #374151; }

  @media (max-width: 480px) {
    #prompt-english { font-size: 17px; }
    .dpad-btn { width: 50px; height: 50px; font-size: 18px; }
    .dpad-spacer { width: 50px; }
  }
</style>
</head>

<div id="top-bar">
  <button id="back-btn" onclick="handleBack()">← Back to Games</button>
  <div id="game-title-bar">🌀 Maze Navigator</div>
  <div id="level-badge"></div>
</div>

<!-- LEVEL SELECT -->
<div id="screen-levels" class="screen active">
  <h1>🌀 Maze Navigator</h1>
  <p class="sub">Navigate the maze to find the correct Aramaic word for each clue!</p>
  <div id="levels-grid"></div>
</div>

<!-- START SCREEN -->
<div id="screen-start" class="screen">
  <div id="start-icon">🌀</div>
  <div id="start-level-title"></div>
  <div id="start-level-sub"></div>
  <div id="start-level-info"></div>
  <button id="start-btn" onclick="beginGame()">Start Maze! 🚀</button>
</div>

<!-- GAME SCREEN -->
<div id="screen-game" class="screen">
  <div id="game-header">
    <div id="round-indicator">Round 1 / 10</div>
  </div>
  <div id="prompt-area">
    <div id="prompt-label">🔍 Find the Aramaic word for…</div>
    <div id="prompt-english"></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="maze-canvas"></canvas>
  </div>
  <div id="confirm-hint">↵ Walk to a word, then press CONFIRM</div>

  <div id="dpad">
    <div class="dpad-row">
      <div class="dpad-spacer"></div>
      <button class="dpad-btn" id="dpad-up" ontouchstart="handleDpad('N',event)" onclick="handleDpad('N')">↑</button>
      <div class="dpad-spacer"></div>
    </div>
    <div class="dpad-row">
      <button class="dpad-btn" id="dpad-left" ontouchstart="handleDpad('W',event)" onclick="handleDpad('W')">←</button>
      <button class="dpad-btn" id="dpad-down" ontouchstart="handleDpad('S',event)" onclick="handleDpad('S')">↓</button>
      <button class="dpad-btn" id="dpad-right" ontouchstart="handleDpad('E',event)" onclick="handleDpad('E')">→</button>
    </div>
    <button id="confirm-btn" ontouchstart="handleConfirmTouch(event)" onclick="handleConfirm()">✓ CONFIRM</button>
  </div>
</div>

<!-- FLASH MESSAGE -->
<div id="flash-msg"></div>

<!-- RESULTS SCREEN -->
<div id="screen-results" class="screen">
  <div id="results-header">
    <div id="results-emoji"></div>
    <div id="results-title"></div>
    <div id="results-subtitle"></div>
  </div>
  <div id="stars-display"></div>
  <div id="results-score"></div>
  <div id="results-table-wrap">
    <table id="results-table"></table>
  </div>
  <div id="results-btns">
    <button class="results-btn btn-gray" onclick="goLevels()">← Back to Levels</button>
    <button class="results-btn btn-amber" onclick="playAgain()">▶ Play Again</button>
    <button class="results-btn btn-amber-dark" id="next-level-btn" onclick="nextLevel()">Next Level →</button>
  </div>
</div>

const MAZE_COLS = 13;
const MAZE_ROWS = 10;

const LEVELS_DATA = {

      {ar:"מִנָּא הָנֵי מִילֵּי",en:"from where do we know this?"},{ar:"הִלְכָּךְ",en:"therefore"},

const LEVEL_COLORS = { 1:'#16a34a', 2:'#3b82f6', 3:'#f59e0b', 4:'#ef4444' };

// ===================== PROGRESS =====================
const STORAGE_KEY = 'gemara_bm_progress';
function getProgress() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
function saveProgress(gameId, level, stars) {
  const p = getProgress();
  if (!p[gameId]) p[gameId] = {};
  if (!p[gameId][level] || stars > p[gameId][level]) p[gameId][level] = stars;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}
function isUnlocked(gameId, level) {
  if (level === 1) return true;
  const p = getProgress();
  return !!(p[gameId] && p[gameId][level-1] > 0);
}
function calcStars(correct, total) {
  const pct = correct / total;
  if (pct >= 0.9) return 3; if (pct >= 0.6) return 2; return 1;
}
function getStars(gameId, level) {
  const p = getProgress();
  return (p[gameId] && p[gameId][level]) || 0;
}

// ===================== SOUND =====================
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    if (type === 'correct') {
      osc.type='sine';
      osc.frequency.setValueAtTime(523,ctx.currentTime);
      osc.frequency.setValueAtTime(659,ctx.currentTime+0.12);
      osc.frequency.setValueAtTime(784,ctx.currentTime+0.25);
      gain.gain.setValueAtTime(0.3,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.5);
      osc.start();osc.stop(ctx.currentTime+0.5);
    } else if (type === 'wrong') {
      osc.type='sawtooth';
      osc.frequency.setValueAtTime(250,ctx.currentTime);
      osc.frequency.setValueAtTime(180,ctx.currentTime+0.15);
      gain.gain.setValueAtTime(0.2,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.3);
      osc.start();osc.stop(ctx.currentTime+0.3);
    } else if (type === 'levelComplete') {
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0.25,ctx.currentTime+i*0.15);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.15+0.35);
        o.start(ctx.currentTime+i*0.15);o.stop(ctx.currentTime+i*0.15+0.4);
      });
    } else if (type === 'step') {
      osc.type='sine';osc.frequency.value=440;
      gain.gain.setValueAtTime(0.05,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.04);
      osc.start();osc.stop(ctx.currentTime+0.04);
    }
  } catch(e) {}
}

// ===================== UTILS =====================
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showFlash(msg, color) {
  const el = document.getElementById('flash-msg');
  el.textContent = msg;
  el.style.background = color;
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 1300);
}

// ===================== LEVEL SELECT =====================

}

function goLevels() {
  cancelAnimationFrame(rafId);
  rafId = null;
  const badge = document.getElementById('level-badge');

  showScreen('screen-levels');

function handleBack() {

  if (onLevelScreen) {
    window.location.href = 'index.html';

function showStartScreen(lvl) {
  currentLevel = lvl;
  const ld = LEVELS_DATA[lvl];
  document.getElementById('start-level-title').textContent = `Level ${lvl}: ${ld.title}`;
  document.getElementById('start-level-sub').textContent = ld.subtitle;
  document.getElementById('start-level-info').textContent =
    `${ld.words.length} words to find • Navigate the maze • Press CONFIRM when on the right word`;

  const badge = document.getElementById('level-badge');
  badge.textContent = `Level ${lvl} — ${ld.title}`;
  badge.style.background = LEVEL_COLORS[lvl];
  badge.style.display = 'block';

  const url = new URL(window.location.href);
  url.searchParams.set('level', lvl);
  window.history.replaceState({}, '', url);

  showScreen('screen-start');
}

// ===================== MAZE GENERATION =====================
function generateMaze(cols, rows) {
  const cells = [];
  for (let y = 0; y < rows; y++) {
    cells[y] = [];
    for (let x = 0; x < cols; x++) {
      cells[y][x] = { x, y, walls: { N: true, S: true, E: true, W: true }, visited: false };
    }
  }

  const stack = [];
  const start = cells[0][0];
  start.visited = true;
  stack.push(start);

  while (stack.length > 0) {
    const current = stack[stack.length - 1];
    const neighbors = [];
    const { x, y } = current;
    if (y > 0 && !cells[y-1][x].visited) neighbors.push({ cell: cells[y-1][x], dir: 'N' });
    if (y < rows-1 && !cells[y+1][x].visited) neighbors.push({ cell: cells[y+1][x], dir: 'S' });
    if (x < cols-1 && !cells[y][x+1].visited) neighbors.push({ cell: cells[y][x+1], dir: 'E' });
    if (x > 0 && !cells[y][x-1].visited) neighbors.push({ cell: cells[y][x-1], dir: 'W' });

    if (neighbors.length > 0) {
      const { cell: next, dir } = neighbors[Math.floor(Math.random() * neighbors.length)];
      const opposite = { N:'S', S:'N', E:'W', W:'E' };
      current.walls[dir] = false;
      next.walls[opposite[dir]] = false;
      next.visited = true;
      stack.push(next);
    } else {
      stack.pop();
    }
  }
  return cells;
}

// ===================== GAME STATE =====================
let currentLevel = 1;
let levelData = null;
let shuffledWords = [];
let currentRoundIdx = 0;
let currentTarget = null;
let mazeGrid = null;
let goalCells = [];
let roundResults = [];

// Player
let player = { x: 6, y: 4, drawX: 0, drawY: 0, targetDrawX: 0, targetDrawY: 0 };
let cellSize = 42;
let rafId = null;
let pulsePhase = 0;
let lastTimestamp = 0;

// Flash timer for confirm hint
let confirmHintTimer = null;

// ===================== CELL SIZE CALC =====================
function calcCellSize() {
  const vw = window.innerWidth;
  const availW = Math.min(vw - 32, 700); // max 700px wide
  const fromW = Math.floor(availW / MAZE_COLS);
  // Also consider vertical space
  const availH = window.innerHeight - 340; // rough estimate of non-maze UI
  const fromH = Math.floor(availH / MAZE_ROWS);
  let cs = Math.min(fromW, fromH);
  cs = Math.max(cs, 28); // minimum 28px
  cs = Math.min(cs, 52); // maximum 52px
  return cs;
}

// ===================== DRAW MAZE =====================
function drawMaze(ctx, cells, cs) {
  ctx.strokeStyle = '#92400e';
  ctx.lineWidth = 2;

  cells.forEach(row => row.forEach(cell => {
    const px = cell.x * cs;
    const py = cell.y * cs;

    // Background
    ctx.fillStyle = '#fef9ee';
    ctx.fillRect(px, py, cs, cs);

    // Walls
    ctx.beginPath();
    if (cell.walls.N) { ctx.moveTo(px, py); ctx.lineTo(px + cs, py); }
    if (cell.walls.S) { ctx.moveTo(px, py + cs); ctx.lineTo(px + cs, py + cs); }
    if (cell.walls.W) { ctx.moveTo(px, py); ctx.lineTo(px, py + cs); }
    if (cell.walls.E) { ctx.moveTo(px + cs, py); ctx.lineTo(px + cs, py + cs); }
    ctx.stroke();
  }));
}

function drawGoals(ctx, cs, pulse) {
  goalCells.forEach(g => {
    const px = g.x * cs;
    const py = g.y * cs;
    const pad = 3;

    // Check if player is on this cell
    const isPlayerHere = (player.x === g.x && player.y === g.y);
    const alpha = isPlayerHere ? (0.7 + 0.3 * Math.sin(pulse)) : 1.0;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Background fill
    ctx.fillStyle = '#fbbf24';
    ctx.beginPath();
    ctx.roundRect
      ? ctx.roundRect(px + pad, py + pad, cs - pad*2, cs - pad*2, 4)
      : ctx.rect(px + pad, py + pad, cs - pad*2, cs - pad*2);
    ctx.fill();

    // Border
    ctx.strokeStyle = '#92400e';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.roundRect
      ? ctx.roundRect(px + pad, py + pad, cs - pad*2, cs - pad*2, 4)
      : ctx.rect(px + pad, py + pad, cs - pad*2, cs - pad*2);
    ctx.stroke();

    // Aramaic text — scale font to fit
    ctx.fillStyle = '#1c0a00';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const maxW = cs - pad*2 - 4;
    let fontSize = Math.max(9, Math.floor(cs * 0.28));
    ctx.font = `bold ${fontSize}px "Frank Ruhl Libre", serif`;

    // Reduce until fits
    while (fontSize > 7 && ctx.measureText(g.word.ar).width > maxW) {
      fontSize--;
      ctx.font = `bold ${fontSize}px "Frank Ruhl Libre", serif`;
    }

    ctx.fillText(g.word.ar, px + cs / 2, py + cs / 2, maxW);

    ctx.restore();
  });
}

function drawPlayer(ctx, cs) {
  const r = cs * 0.28;
  const cx = player.drawX + cs / 2;
  const cy = player.drawY + cs / 2;

  // White border
  ctx.beginPath();
  ctx.arc(cx, cy, r + 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();

  // Amber fill
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = '#d97706';
  ctx.fill();

  // Face dot
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.25, 0, Math.PI * 2);
  ctx.fillStyle = '#fff';
  ctx.fill();
}

// ===================== ANIMATION LOOP =====================
function gameLoop(timestamp) {
  if (!lastTimestamp) lastTimestamp = timestamp;
  const dt = timestamp - lastTimestamp;
  lastTimestamp = timestamp;

  pulsePhase += dt * 0.006; // pulse speed

  const canvas = document.getElementById('maze-canvas');
  const ctx = canvas.getContext('2d');

  // Lerp player position
  const speed = 0.18;
  player.drawX += (player.targetDrawX - player.drawX) * Math.min(1, speed * dt / 16);
  player.drawY += (player.targetDrawY - player.drawY) * Math.min(1, speed * dt / 16);

  // Redraw
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawMaze(ctx, mazeGrid, cellSize);
  drawGoals(ctx, cellSize, pulsePhase);
  drawPlayer(ctx, cellSize);

  rafId = requestAnimationFrame(gameLoop);
}

// ===================== PLAYER MOVEMENT =====================
function tryMove(dir) {
  const cell = mazeGrid[player.y][player.x];
  let next = null;
  if (dir === 'N' && !cell.walls.N) next = { x: player.x, y: player.y - 1 };
  if (dir === 'S' && !cell.walls.S) next = { x: player.x, y: player.y + 1 };
  if (dir === 'E' && !cell.walls.E) next = { x: player.x + 1, y: player.y };
  if (dir === 'W' && !cell.walls.W) next = { x: player.x - 1, y: player.y };

  if (next) {
    player.x = next.x;
    player.y = next.y;
    player.targetDrawX = next.x * cellSize;
    player.targetDrawY = next.y * cellSize;
    playSound('step');

    // Update confirm hint
    const isOnGoal = goalCells.some(g => g.x === player.x && g.y === player.y);
    const hint = document.getElementById('confirm-hint');
    if (isOnGoal) {
      hint.textContent = '↵ Press CONFIRM to answer!';
      hint.style.color = '#d97706';
      hint.style.fontWeight = '800';
    } else {
      hint.textContent = '↵ Walk to a word, then press CONFIRM';
      hint.style.color = '';
      hint.style.fontWeight = '';
    }
  }
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('screen-game').classList.contains('active')) return;
  const map = { ArrowUp:'N', ArrowDown:'S', ArrowRight:'E', ArrowLeft:'W' };
  if (map[e.key]) {
    e.preventDefault();
    tryMove(map[e.key]);
  } else if (e.key === 'Enter') {
    e.preventDefault();
    handleConfirm();
  }
});

function handleDpad(dir, evt) {
  if (evt && evt.type === 'touchstart') evt.preventDefault();
  if (!document.getElementById('screen-game').classList.contains('active')) return;
  tryMove(dir);
}

function handleConfirmTouch(evt) {
  evt.preventDefault();
  handleConfirm();
}

function handleConfirm() {
  if (!document.getElementById('screen-game').classList.contains('active')) return;
  const goal = goalCells.find(g => g.x === player.x && g.y === player.y);
  if (!goal) {
    showFlash("Walk to a word first! 🚶", '#f59e0b');
    const hint = document.getElementById('confirm-hint');
    hint.classList.remove('pulse');
    void hint.offsetWidth; // reflow
    hint.classList.add('pulse');
    return;
  }

  const correct = goal.word.ar === currentTarget.ar;
  roundResults.push({
    round: currentRoundIdx + 1,
    en: currentTarget.en,
    correctAr: currentTarget.ar,
    chosenAr: goal.word.ar,
    ok: correct
  });

  if (correct) {
    playSound('correct');
    showFlash('✓ Correct!', '#16a34a');
  } else {
    playSound('wrong');
    showFlash('✗ Wrong!\n' + currentTarget.ar, '#ef4444');
  }

  setTimeout(() => nextRound(), 1500);
}

// ===================== ROUND SETUP =====================
function nextRound() {
  currentRoundIdx++;
  if (currentRoundIdx >= shuffledWords.length) {
    showResults();
    return;
  }
  setupRound();
}

function setupRound() {
  currentTarget = shuffledWords[currentRoundIdx];
  const total = shuffledWords.length;

  document.getElementById('round-indicator').textContent = `Round ${currentRoundIdx + 1} / ${total}`;
  document.getElementById('prompt-english').textContent = currentTarget.en;

  // Regenerate maze
  mazeGrid = generateMaze(MAZE_COLS, MAZE_ROWS);

  // Pick 4 goal words: 1 correct + 3 wrong
  const pool = levelData.words.filter(w => w.ar !== currentTarget.ar);
  const wrong = shuffle(pool).slice(0, 3);
  const fourWords = shuffle([currentTarget, ...wrong]);

  // Place goal cells at fixed quadrant positions
  const positions = [
    { x: 2, y: 2 },   // top-left
    { x: 10, y: 2 },  // top-right
    { x: 2, y: 7 },   // bottom-left
    { x: 10, y: 7 },  // bottom-right
  ];

  goalCells = fourWords.map((word, i) => ({
    x: positions[i].x,
    y: positions[i].y,
    word
  }));

  // Reset player to center
  player.x = 6;
  player.y = 4;
  player.drawX = player.x * cellSize;
  player.drawY = player.y * cellSize;
  player.targetDrawX = player.drawX;
  player.targetDrawY = player.drawY;

  // Reset confirm hint
  const hint = document.getElementById('confirm-hint');
  hint.textContent = '↵ Walk to a word, then press CONFIRM';
  hint.style.color = '';
  hint.style.fontWeight = '';
  hint.classList.remove('pulse');
}

// ===================== BEGIN GAME =====================
function beginGame() {
  levelData = LEVELS_DATA[currentLevel];
  shuffledWords = shuffle([...levelData.words]);
  currentRoundIdx = 0;
  roundResults = [];

  // Calc cell size
  cellSize = calcCellSize();

  const canvas = document.getElementById('maze-canvas');
  canvas.width = MAZE_COLS * cellSize;
  canvas.height = MAZE_ROWS * cellSize;

  showScreen('screen-game');
  setupRound();

  // Start animation loop
  cancelAnimationFrame(rafId);
  lastTimestamp = 0;
  rafId = requestAnimationFrame(gameLoop);
}

// Resize handler
window.addEventListener('resize', () => {
  if (!document.getElementById('screen-game').classList.contains('active')) return;
  const newCS = calcCellSize();
  if (newCS !== cellSize) {
    cellSize = newCS;
    const canvas = document.getElementById('maze-canvas');
    canvas.width = MAZE_COLS * cellSize;
    canvas.height = MAZE_ROWS * cellSize;
    // Snap player draw position
    player.drawX = player.x * cellSize;
    player.drawY = player.y * cellSize;
    player.targetDrawX = player.drawX;
    player.targetDrawY = player.drawY;
  }
});

// ===================== RESULTS =====================
function showResults() {
  cancelAnimationFrame(rafId);
  rafId = null;

  playSound('levelComplete');

  const total = shuffledWords.length;
  const correct = roundResults.filter(r => r.ok).length;
  const stars = calcStars(correct, total);
  saveProgress(GAME_ID, currentLevel, stars);

  const pct = Math.round(correct / total * 100);
  let emoji, title, subtitle;
  if (pct >= 90) {
    emoji = '🏆'; title = 'Excellent!'; subtitle = `Outstanding! ${correct} out of ${total} correct.`;
  } else if (pct >= 60) {
    emoji = '👍'; title = 'Good Work!'; subtitle = `${correct} out of ${total} correct. Keep practicing!`;
  } else {
    emoji = '💪'; title = 'Keep Trying!'; subtitle = `${correct} out of ${total} correct. You can do it!`;
  }

  document.getElementById('results-emoji').textContent = emoji;
  document.getElementById('results-title').textContent = title;
  document.getElementById('results-subtitle').textContent = subtitle;
  document.getElementById('results-score').textContent = `Score: ${correct} / ${total} (${pct}%)`;

  const starStr = '★'.repeat(stars) + '☆'.repeat(3 - stars);
  document.getElementById('stars-display').textContent = starStr;

  // Table
  const table = document.getElementById('results-table');
  let html = `<thead><tr>
    <th>#</th><th>English Prompt</th><th>You Chose</th><th>Correct Answer</th><th>Result</th>
  </tr></thead><tbody>`;
  roundResults.forEach(r => {
    html += `<tr>
      <td>${r.round}</td>
      <td>${r.en}</td>
      <td class="aramaic-cell">${r.chosenAr}</td>
      <td class="aramaic-cell">${r.correctAr}</td>
      <td class="${r.ok ? 'ok' : 'fail'}">${r.ok ? '✓' : '✗'}</td>
    </tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;

  // Next level button
  const nextBtn = document.getElementById('next-level-btn');
  nextBtn.style.display = currentLevel < 4 ? 'inline-block' : 'none';

  showScreen('screen-results');
}

function playAgain() {
  showStartScreen(currentLevel);
}

function nextLevel() {
  if (currentLevel < 4) showStartScreen(currentLevel + 1);
}

// ===================== URL ROUTING =====================
function init() {
  const params = new URLSearchParams(window.location.search);
  const lvl = parseInt(params.get('level'));
  if (lvl && lvl >= 1 && lvl <= 4 && isUnlocked(GAME_ID, lvl)) {
    showStartScreen(lvl);
  } else {
    renderLevelSelect();
    showScreen('screen-levels');
  }
}

init();
</script>
