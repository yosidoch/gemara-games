function getProgress() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
function saveProgress(gameId, level, stars) {
  const p = getProgress();
  if (!p[gameId]) p[gameId] = {};
  if (!p[gameId][level] || stars > p[gameId][level]) p[gameId][level] = stars;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}
function isUnlocked(gameId, level) {
  if (level === 1) return true;
  const p = getProgress();
  return !!(p[gameId] && p[gameId][level-1] > 0);
}
function calcStars(correct, total) {
  const pct = correct / total;
  if (pct >= 0.9) return 3; if (pct >= 0.6) return 2; return 1;
}

function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (type === 'shoot') {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sawtooth'; o.frequency.setValueAtTime(400,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(60,ctx.currentTime+0.12);
      g.gain.setValueAtTime(0.15,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.12);
      o.start(); o.stop(ctx.currentTime+0.12);
    } else if (type === 'correct') {
      [523,659,784].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0.2,ctx.currentTime+i*0.1);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.1+0.2);
        o.start(ctx.currentTime+i*0.1);o.stop(ctx.currentTime+i*0.1+0.25);
      });
    } else if (type === 'wrong') {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='square';o.frequency.setValueAtTime(180,ctx.currentTime);
      o.frequency.setValueAtTime(140,ctx.currentTime+0.1);
      g.gain.setValueAtTime(0.18,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.25);
      o.start();o.stop(ctx.currentTime+0.25);
    } else if (type === 'levelComplete') {
      [523,659,784,1047].forEach((f,i)=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.type='sine';o.frequency.value=f;
        g.gain.setValueAtTime(0.25,ctx.currentTime+i*0.18);
        g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+i*0.18+0.35);
        o.start(ctx.currentTime+i*0.18);o.stop(ctx.currentTime+i*0.18+0.4);
      });
    } else if (type === 'pop') {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.type='sine';o.frequency.setValueAtTime(700,ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(200,ctx.currentTime+0.08);
      g.gain.setValueAtTime(0.3,ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.08);
      o.start();o.stop(ctx.currentTime+0.08);
    }
  } catch(e) {}
}

  });

// ——— Star layers ———
function buildStarLayer(count, maxR, maxSpeed) {
  const s = [];
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * maxSpeed + 4;
    s.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * maxR + 0.4,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd
    });
  }
  return s;
}

// ——— Shuffle ———
function shuffle(arr) {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

// ——— Build asteroid shape (8 points with random offsets) ———
function buildAsteroidPoints(radius) {
  const pts = [];
  const n = 8;
  for (let i = 0; i < n; i++) {
    const baseAng = (i / n) * Math.PI * 2;
    const jitter = (Math.random() * 0.45 - 0.22);
    const ang = baseAng + jitter;
    const r = radius * (0.7 + Math.random() * 0.5);
    pts.push({ x: Math.cos(ang) * r, y: Math.sin(ang) * r });
  }
  return pts;
}

  const count = ASTEROID_COUNTS[currentLevel];
  asteroids = [];
  const wordPool = levelData.words;
  const targetWord = shuffledWords[roundIndex];
  const otherWords = wordPool.filter(w => w.ar !== targetWord.ar);
  shuffle(otherWords);

  const cx = canvas.width / 2;
  const cy = canvas.height / 2;
  const minDist = 140;

  for (let i = 0; i < count; i++) {
    const word = i === 0 ? targetWord : otherWords[(i-1) % otherWords.length];
    const radius = 44 + Math.random() * 18;

    // Spawn away from center
    let ax, ay, attempts = 0;
    do {
      ax = 80 + Math.random() * (canvas.width - 160);
      ay = 80 + Math.random() * (canvas.height - 160);
      attempts++;
    } while (Math.hypot(ax-cx, ay-cy) < minDist && attempts < 20);

    const ang = Math.random() * Math.PI * 2;
    const spd = levelData.enemySpeed * (0.5 + Math.random() * 0.7);
    const rotDir = Math.random() < 0.5 ? 1 : -1;
    const rotSpeed = (0.3 + Math.random() * 0.5) * rotDir;

    asteroids.push({
      x: ax, y: ay,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      word: word.ar,
      radius: radius,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: rotSpeed,
      color: ASTEROID_COLORS[i % ASTEROID_COLORS.length],
      points: buildAsteroidPoints(radius)
    });
  }
}

// ——— HUD ———
function updateHUD() {
  const heartsEl = document.getElementById('hudLives');
  heartsEl.innerHTML = Array.from({length:3},(_,i)=>
    `<span style="color:${i<lives?'#ef4444':'#94a3b8'};margin-right:2px">♥</span>`
  ).join('');
  const wordEl = document.getElementById('hudWord');
  if (roundIndex < shuffledWords.length)
    wordEl.textContent = `Shoot: ${shuffledWords[roundIndex].en}`;
  const progEl = document.getElementById('hudProgress');
  progEl.textContent = `${roundIndex+1} / ${shuffledWords.length}`;
}

// ——— Game Loop ———
function gameLoop(ts) {
  if (gameState !== 'playing') return;
  const dt = Math.min((ts - lastTime)/1000, 0.1);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

let isRotating = false;

function update(dt) {
  const rotating = keys['ArrowLeft'] || keys['left'] || keys['ArrowRight'] || keys['right'];
  isRotating = rotating;

  if (keys['ArrowLeft'] || keys['left']) ship.angle -= ship.rotSpeed * dt;
  if (keys['ArrowRight'] || keys['right']) ship.angle += ship.rotSpeed * dt;

  // Thruster particles when rotating
  if (rotating) {
    const behind = ship.angle + Math.PI;
    for (let i = 0; i < 2; i++) {
      const spread = (Math.random()-0.5)*0.8;
      const spd = 60 + Math.random()*60;
      thrusterParticles.push({
        x: ship.x + Math.cos(behind)*14,
        y: ship.y + Math.sin(behind)*14,
        vx: Math.cos(behind+spread)*spd,
        vy: Math.sin(behind+spread)*spd,
        life: 0.25, maxLife: 0.25
      });
    }
  }
  thrusterParticles.forEach(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; });
  thrusterParticles = thrusterParticles.filter(p=>p.life>0);

  // Move parallax stars
  starsLayer1.forEach(s => {
    s.x += s.vx * dt * 0.3; s.y += s.vy * dt * 0.3;
    if (s.x < 0) s.x += canvas.width; if (s.x > canvas.width) s.x -= canvas.width;
    if (s.y < 0) s.y += canvas.height; if (s.y > canvas.height) s.y -= canvas.height;
  });
  starsLayer2.forEach(s => {
    s.x += s.vx * dt * 0.6; s.y += s.vy * dt * 0.6;
    if (s.x < 0) s.x += canvas.width; if (s.x > canvas.width) s.x -= canvas.width;
    if (s.y < 0) s.y += canvas.height; if (s.y > canvas.height) s.y -= canvas.height;
  });

  // Move bullets
  bullets.forEach(b => {
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.life -= dt;
  });
  bullets = bullets.filter(b => b.life > 0);

  // Move & rotate asteroids — bounce off walls
  asteroids.forEach(a => {
    a.x += a.vx * dt;
    a.y += a.vy * dt;
    a.rotation += a.rotSpeed * dt;

    if (a.x - a.radius < 0) { a.x = a.radius; a.vx = Math.abs(a.vx); }
    if (a.x + a.radius > canvas.width) { a.x = canvas.width-a.radius; a.vx = -Math.abs(a.vx); }
    if (a.y - a.radius < 0) { a.y = a.radius; a.vy = Math.abs(a.vy); }
    if (a.y + a.radius > canvas.height) { a.y = canvas.height-a.radius; a.vy = -Math.abs(a.vy); }
  });

  // Bullet-asteroid collision
  let hitThisFrame = false;
  outer:
  for (let bi = bullets.length-1; bi >= 0; bi--) {
    const b = bullets[bi];
    for (let ai = asteroids.length-1; ai >= 0; ai--) {
      const a = asteroids[ai];
      const dist = Math.hypot(b.x-a.x, b.y-a.y);
      if (dist < a.radius * 0.85) {
        hitThisFrame = true;
        const target = shuffledWords[roundIndex];
        const correct = a.word === target.ar;
        results.push({en: target.en, correct: target.ar, shot: a.word, ok: correct});
        if (correct) {
          playSound('correct');
          flashOverlay = {color:'rgba(0,200,0,0.15)', until: performance.now()+300};
          spawnParticles(b.x, b.y, '#facc15', 10);
        } else {
          playSound('wrong');
          flashOverlay = {color:'rgba(255,0,0,0.15)', until: performance.now()+300};
          spawnParticles(b.x, b.y, '#ef4444', 10);
          lives--;
        }
        bullets.splice(bi, 1);
        roundIndex++;
        if (roundIndex >= shuffledWords.length) {
          setTimeout(endGame, 400);
          return;
        }
        spawnAsteroids();
        updateHUD();
        break outer;
      }
    }
  }

  // Particles
  particles.forEach(p => { p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; });
  particles = particles.filter(p=>p.life>0);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = 80 + Math.random()*150;
    particles.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,color,life:0.55,maxLife:0.55});
  }
}

// ——— Draw ———
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx2.clearRect(0,0,W,H);

  // Background gradient
  const grad = ctx2.createLinearGradient(0,0,W,H);
  grad.addColorStop(0,'#faf5ff'); grad.addColorStop(1,'#f0f9ff');
  ctx2.fillStyle = grad; ctx2.fillRect(0,0,W,H);

  // Stars layer 1 (small, slow)
  starsLayer1.forEach(s => {
    ctx2.beginPath(); ctx2.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx2.fillStyle = 'rgba(167,139,250,0.45)'; ctx2.fill();
  });
  // Stars layer 2 (larger, faster)
  starsLayer2.forEach(s => {
    ctx2.beginPath(); ctx2.arc(s.x,s.y,s.r,0,Math.PI*2);
    ctx2.fillStyle = 'rgba(96,165,250,0.35)'; ctx2.fill();
  });

  // Thruster particles
  thrusterParticles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx2.beginPath(); ctx2.arc(p.x,p.y,3*alpha,0,Math.PI*2);
    ctx2.fillStyle = `rgba(251,146,60,${alpha})`; ctx2.fill();
  });

  // Asteroids
  asteroids.forEach(a => {
    ctx2.save();
    ctx2.translate(a.x, a.y);
    ctx2.rotate(a.rotation);

    // Draw irregular octagon shape
    ctx2.beginPath();
    ctx2.moveTo(a.points[0].x, a.points[0].y);
    for (let i = 1; i < a.points.length; i++) ctx2.lineTo(a.points[i].x, a.points[i].y);
    ctx2.closePath();
    ctx2.fillStyle = a.color; ctx2.fill();
    ctx2.strokeStyle = '#7c3aed'; ctx2.lineWidth = 1.8; ctx2.stroke();

    ctx2.restore();

    // Aramaic text drawn UPRIGHT (not rotating with asteroid)
    ctx2.save();
    ctx2.font = "15px 'Frank Ruhl Libre', serif";
    ctx2.textAlign = 'center'; ctx2.textBaseline = 'middle';
    ctx2.fillStyle = '#1e1b4b';
    // Text shadow for legibility
    ctx2.shadowColor = 'rgba(255,255,255,0.9)';
    ctx2.shadowBlur = 4;
    ctx2.fillText(a.word, a.x, a.y);
    ctx2.restore();
  });

  // Bullets
  bullets.forEach(b => {
    const alpha = Math.min(1, b.life * 2);
    ctx2.beginPath(); ctx2.arc(b.x,b.y,4,0,Math.PI*2);
    ctx2.fillStyle = `rgba(250,204,21,${alpha})`; ctx2.fill();
    ctx2.strokeStyle = `rgba(202,138,4,${alpha})`; ctx2.lineWidth=1; ctx2.stroke();
  });

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx2.beginPath(); ctx2.arc(p.x,p.y,4*alpha,0,Math.PI*2);
    ctx2.fillStyle = p.color + Math.floor(alpha*255).toString(16).padStart(2,'0');
    ctx2.fill();
  });

  // Ship
  drawShip();

  // Flash overlay
  if (flashOverlay && performance.now() < flashOverlay.until) {
    ctx2.fillStyle = flashOverlay.color;
    ctx2.fillRect(0,0,W,H);
  }
}

function drawShip() {
  const { x, y, angle } = ship;
  ctx2.save();
  ctx2.translate(x, y);
  ctx2.rotate(angle + Math.PI/2);

  // Aim line (dotted, in facing direction) — drawn before rotation compensation
  // We'll draw this separately
  ctx2.restore();

  // Aim line (dotted)
  ctx2.save();
  ctx2.setLineDash([5,5]);
  ctx2.strokeStyle = 'rgba(147,51,234,0.4)';
  ctx2.lineWidth = 1.5;
  ctx2.beginPath();
  ctx2.moveTo(x, y);
  ctx2.lineTo(x + Math.cos(ship.angle)*90, y + Math.sin(ship.angle)*90);
  ctx2.stroke();
  ctx2.setLineDash([]);
  ctx2.restore();

  // Ship body
  ctx2.save();
  ctx2.translate(x, y);
  ctx2.rotate(angle + Math.PI/2);

  // Engine glow
  const glow = ctx2.createRadialGradient(0,12,2,0,12,18);
  glow.addColorStop(0,'rgba(167,139,250,0.7)'); glow.addColorStop(1,'rgba(167,139,250,0)');
  ctx2.fillStyle = glow; ctx2.beginPath(); ctx2.arc(0,14,18,0,Math.PI*2); ctx2.fill();

  // Wings
  ctx2.fillStyle = '#6d28d9';
  ctx2.beginPath(); ctx2.moveTo(0,-22); ctx2.lineTo(-24,10); ctx2.lineTo(-10,5); ctx2.closePath(); ctx2.fill();
  ctx2.beginPath(); ctx2.moveTo(0,-22); ctx2.lineTo(24,10); ctx2.lineTo(10,5); ctx2.closePath(); ctx2.fill();

  // Body
  ctx2.fillStyle = '#9333ea';
  ctx2.beginPath(); ctx2.moveTo(0,-28); ctx2.lineTo(13,14); ctx2.lineTo(0,8); ctx2.lineTo(-13,14); ctx2.closePath(); ctx2.fill();

  // Cockpit
  ctx2.fillStyle = '#e9d5ff';
  ctx2.beginPath(); ctx2.ellipse(0,-8,4,7,0,0,Math.PI*2); ctx2.fill();

  ctx2.restore();
}

// ——— Shoot ———
function shoot() {
  const now = performance.now();
  if (now - lastShot < 350) return;
  lastShot = now;
  playSound('shoot');
  const spd = levelData.bulletSpeed;
  bullets.push({
    x: ship.x + Math.cos(ship.angle)*28,
    y: ship.y + Math.sin(ship.angle)*28,
    vx: Math.cos(ship.angle)*spd,
    vy: Math.sin(ship.angle)*spd,
    life: 2.0
  });
}

// ——— End game ———
function endGame() {
  gameState = 'results';
  controls.classList.add('hidden');
  hud.classList.add('hidden');
  playSound('levelComplete');

  const correct = results.filter(r=>r.ok).length;
  const total = results.length;
  const stars = calcStars(correct, total);
  saveProgress(GAME_ID, currentLevel, stars);

  document.getElementById('resultsTitle').textContent =
    correct === total ? `Level ${currentLevel} Complete! 🎉` : `Level ${currentLevel} Done`;
  document.getElementById('starsRow').textContent = '★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('scoreLabel').textContent = `${correct} / ${total} correct`;

  const tbody = document.getElementById('resultsTbody');
  tbody.innerHTML = '';
  results.forEach((r,i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${i+1}</td><td style="text-align:left">${r.en}</td>
      <td style="font-family:'Frank Ruhl Libre',serif">${r.correct}</td>
      <td style="font-family:'Frank Ruhl Libre',serif">${r.shot}</td>
      <td class="${r.ok?'ok':'bad'}">${r.ok?'✓':'✗'}</td>`;
    tbody.appendChild(tr);
  });

  const btnRow = document.getElementById('btnRow');
  btnRow.innerHTML = '';

  const replayBtn = document.createElement('button');
  replayBtn.className = 'btnPurple'; replayBtn.textContent = '↺ Play Again';
  replayBtn.onclick = () => { document.getElementById('resultsScreen').classList.add('hidden'); startGame(); };
  btnRow.appendChild(replayBtn);

  const levBtn = document.createElement('button');
  levBtn.className = 'btnGrey'; levBtn.textContent = '⬛ Levels';
  levBtn.onclick = showLevelSelect;
  btnRow.appendChild(levBtn);

  if (currentLevel < 4 && isUnlocked(GAME_ID, currentLevel+1)) {
    const nextBtn = document.createElement('button');
    nextBtn.className = 'btnGreen'; nextBtn.textContent = `Level ${currentLevel+1} →`;
    nextBtn.onclick = () => { document.getElementById('resultsScreen').classList.add('hidden'); initLevel(currentLevel+1); };
    btnRow.appendChild(nextBtn);
  }

  document.getElementById('resultsScreen').classList.remove('hidden');
}

function showLevelSelect() {
  document.getElementById('resultsScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.add('hidden');
  hud.classList.add('hidden');
  controls.classList.add('hidden');
  buildLevelSelect();
  document.getElementById('levelSelect').classList.remove('hidden');
  gameState = 'levelSelect';
}

// ——— Input ———
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') {
    e.preventDefault();
    if (gameState === 'start') startGame();
    else if (gameState === 'playing') shoot();
  }
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Touch controls
const btnLeft = document.getElementById('btnLeft');
const btnRight = document.getElementById('btnRight');
const btnFire = document.getElementById('btnFire');

['touchstart','mousedown'].forEach(ev => {
  btnLeft.addEventListener(ev, e => { e.preventDefault(); keys['left']=true; }, {passive:false});
  btnRight.addEventListener(ev, e => { e.preventDefault(); keys['right']=true; }, {passive:false});
  btnFire.addEventListener(ev, e => { e.preventDefault(); if(gameState==='playing') shoot(); }, {passive:false});
});
['touchend','mouseup'].forEach(ev => {
  btnLeft.addEventListener(ev, () => keys['left']=false);
  btnRight.addEventListener(ev, () => keys['right']=false);
});
document.getElementById('startBtn').addEventListener('click', () => {
  if (gameState === 'start') startGame();
});

// ——— Resize ———
window.addEventListener('resize', () => {
  if (gameState === 'playing') {
    resizeCanvas();
    ship.x = canvas.width / 2;
    ship.y = canvas.height / 2;
    starsLayer1 = buildStarLayer(40, 0.8, 12);
    starsLayer2 = buildStarLayer(20, 1.4, 22);
    spawnAsteroids();
  }
});

// ——— Init ———
function init() {
  const params = new URLSearchParams(location.search);
  const lvParam = parseInt(params.get('level'));
  if (lvParam && [1,2,3,4].includes(lvParam) && isUnlocked(GAME_ID, lvParam)) {
    initLevel(lvParam);
  } else {
    buildLevelSelect();
    document.getElementById('levelSelect').classList.remove('hidden');
  }
}

document.fonts.ready.then(() => { init(); });
</script>
